l_english:
 rse_war.0001.t:0 "Holy Zeal Before Battle"
 rse_war.0001.desc:0 "On the eve of battle, [court_priest.GetTitledFirstName] gathers the host. The faithful pray, the banners are blessed, and the heretical foe is denounced. The mood is feverish — the army awaits your word."
 rse_war.0001.a:0 "$HIGHLIGHT$Let the priest speak — this is a holy war!$END$"
 rse_war.0001.b:0 "Remind them: we fight for our land, not for the heavens."
 rse_war.0001.c:0 "I have my doubts about this 'holy' cause..."

 rse_war.0002.t:0 "An Infidel in Chains"
 rse_war.0002.desc:0 "[captured_enemy.GetTitledFirstName], a captive of an alien faith, is dragged before you. The court chaplain demands their conversion. Your captains demand their head. Mercy or zeal?"
 rse_war.0002.a:0 "Convert them — let them see the true faith."
 rse_war.0002.b:0 "Make an example. The block awaits."
 rse_war.0002.c:0 "Release them. We are no monsters."

 rse_war.0003.t:0 "The Faithful Rally"
 rse_war.0003.desc:0 "Word of your holy struggle has spread. Peasants, monks, and lay brothers from across the land arrive at your capital, willing to take up arms for the faith."
 rse_war.0003.a:0 "Arm them and march."
 rse_war.0003.b:0 "Bless them and send them home — let the clergy remember our piety."

 rse_realm.0001.t:0 "A Dissenting Vassal"
 rse_realm.0001.desc:0 "[dissident_vassal.GetTitledFirstName], of a faith not your own, has come to court with a list of grievances. Their tone is restrained but their eyes burn with resentment. The realm watches how you respond."
 rse_realm.0001.a:0 "Hear them out. Tolerance is wisdom."
 rse_realm.0001.b:0 "Remind them whose realm this is."
 rse_realm.0001.c:0 "A purse of gold soothes most grievances. (-50 gold)"

 rse_realm.0002.t:0 "A Faction of Faith"
 rse_realm.0002.desc:0 "Whispers from your spymaster: vassals of an alien faith, led by [faction_leader.GetTitledFirstName], are meeting in secret. They speak of grievances, of rights, of perhaps... more."
 rse_realm.0002.a:0 "Appease them with concessions."
 rse_realm.0002.b:0 "Strike first — imprison the ringleader!"
 rse_realm.0002.c:0 "Watch and wait. Knowledge is power."

 rse_realm.0003.t:0 "A Plan for Conversion"
 rse_realm.0003.desc:0 "[court_chaplain.GetTitledFirstName] approaches you with a proposal: a great mission, funded from your coffers, to bring the wayward counties of your realm into the true faith."
 rse_realm.0003.a:0 "Fund the mission. (-100 gold)"
 rse_realm.0003.b:0 "The realm has more pressing needs."

 rse_realm.0004.t:0 "Denounce the Heretics"
 rse_realm.0004.desc:0 "Reports reach you of counties within your realm that openly profess a heretical faith. The pulpits demand a public denunciation."
 rse_realm.0004.a:0 "Denounce them from every pulpit!"
 rse_realm.0004.b:0 "A wise ruler chooses their battles."

 rse_domain.0001.t:0 "Heresy in the Domain"
 rse_domain.0001.desc:0 "Strange sermons are being preached in [troubled_county.GetName]. Peasants gather in barns by night, whispering of new doctrines. Heresy stirs in your own land."
 rse_domain.0001.a:0 "Launch an inquisition. (-75 gold)"
 rse_domain.0001.b:0 "Let them speak. Ideas cannot be chained."
 rse_domain.0001.c:0 "Ignore it. The realm has greater concerns."

 rse_domain.0002.t:0 "The Tax-Resisters"
 rse_domain.0002.desc:0 "Peasants of [rebellious_county.GetName], who do not share your faith, have refused to pay their tithe. They call your tax-collectors infidels and your priests false."
 rse_domain.0002.a:0 "Send soldiers. The tax will be collected — with interest."
 rse_domain.0002.b:0 "Lower their dues to keep the peace. (-25 gold)"
 rse_domain.0002.c:0 "Force them to the true faith!"

 rse_domain.0003.t:0 "A Vision of a Holy Site"
 rse_domain.0003.desc:0 "You wake from a vivid dream: a great temple, rising from the soil of [blessed_county.GetName]. The pious say this is a calling. The treasurer disagrees."
 rse_domain.0003.a:0 "Build it. The gods demand no less. (-150 gold, -100 piety)"
 rse_domain.0003.b:0 "It was only a dream."

 rse_domain.0004.t:0 "Brewing Revolt"
 rse_domain.0004.desc:0 "[revolt_county.GetName] simmers. The peasants — of a foreign faith and discontented — speak openly of casting off your rule. Action is needed before it boils over."
 rse_domain.0004.a:0 "Garrison the county with troops. (-50 gold)"
 rse_domain.0004.b:0 "Offer concessions to calm them."
 rse_domain.0004.c:0 "Convert them by edict, end this once and for all!"

 rse_domain.0005.t:0 "A Courtier of Another Faith"
 rse_domain.0005.desc:0 "[foreign_courtier.GetTitledFirstName] is a long-standing member of your court — but they do not share your faith. The chaplain wishes them removed; you must decide."
 rse_domain.0005.a:0 "Encourage their conversion."
 rse_domain.0005.b:0 "Banish them from court."
 rse_domain.0005.c:0 "They have served well. They stay."

 rse_reconquest.0001.t:0 "A Christian County Under the Crescent"
 rse_reconquest.0001.desc:0 "[conquered_county.GetName] is now yours by the sword. Its people kneel before the cross, not the qibla. [christian_elder.GetTitledFirstName] begs for clemency on behalf of the flock. The ulama await your decree."
 rse_reconquest.0001.a:0 "They shall be dhimmi — protected People of the Book."
 rse_reconquest.0001.b:0 "Let them pay the jizya, and live as they will."
 rse_reconquest.0001.c:0 "All must submit to the true faith — convert them."

 rse_reconquest.0002.t:0 "Cross Against Crescent"
 rse_reconquest.0002.desc:0 "[rebel_county.GetName] simmers. Christian peasants have begun gathering in the hills, hiding crosses beneath their robes and sharpening scythes. A rising is near."
 rse_reconquest.0002.a:0 "Crush them with a garrison. (-75 gold)"
 rse_reconquest.0002.b:0 "Lift the jizya for now — bread before blood. (-50 gold)"
 rse_reconquest.0002.c:0 "Purge the Christian quarter. Make an example."

 rse_reconquest.0003.t:0 "A Bishop's Plea"
 rse_reconquest.0003.desc:0 "[bishop.GetTitledFirstName], a bishop of [christian_county.GetName], has begged audience. He kneels in your court, asking that the churches be spared and his clergy left in peace."
 rse_reconquest.0003.a:0 "Grant his request. A wise sultan rules many faiths."
 rse_reconquest.0003.b:0 "The churches shall keep their walls — and pay a hefty tax."
 rse_reconquest.0003.c:0 "Throw him in chains. Let the Christians know their place."

 rse_reconquest.0004.t:0 "The Reconquista Stirs"
 rse_reconquest.0004.desc:0 "Spies report that [christian_neighbor.GetTitledFirstName] has been preaching of crusade — of taking back the lands you hold from your Christian subjects. The frontier grows uneasy."
 rse_reconquest.0004.a:0 "Fortify the marches. (-100 gold)"
 rse_reconquest.0004.b:0 "Win the hearts of our Christian subjects before they betray us."
 rse_reconquest.0004.c:0 "Crack down — suppress every Christian voice in our lands."

 rse_reconquest.0005.t:0 "A Hidden Cross"
 rse_reconquest.0005.desc:0 "[secret_christian.GetTitledFirstName], who has served your court for years as a faithful Muslim, has been discovered praying before a crucifix in their private chamber. A crypto-Christian, hidden in plain sight."
 rse_reconquest.0005.a:0 "An apostate. The blade decides."
 rse_reconquest.0005.b:0 "Force them to repent and embrace the true faith."
 rse_reconquest.0005.c:0 "Keep their secret. A loyal servant is rare."

 rse_reconquest.0006.t:0 "The Mozarab Question"
 rse_reconquest.0006.desc:0 "In [mozarab_county.GetName], a strange thing unfolds: Christians speak our tongue, dress in our cloth, and sing our songs — yet still cross themselves at dawn. They are neither us nor them. What is to be done with them?"
 rse_reconquest.0006.a:0 "Let them flourish in their own way."
 rse_reconquest.0006.b:0 "Arabize them fully — language, custom, all."
 rse_reconquest.0006.c:0 "They are a curiosity, no more. Leave them be."

 rse_crusade.0001.t:0 "A Saracen County Under the Cross"
 rse_crusade.0001.desc:0 "[conquered_county.GetName] is yours. [imam.GetTitledFirstName], the local imam, comes pleading on behalf of his people. The bishops demand the minarets be cast down. What is your will?"
 rse_crusade.0001.a:0 "Turn every mosque to a church. The cross stands here now."
 rse_crusade.0001.b:0 "Let them be — for the right tribute."
 rse_crusade.0001.c:0 "We shall rule them justly, of every faith."

 rse_crusade.0002.t:0 "Knights of the Order"
 rse_crusade.0002.desc:0 "[templar.GetTitledFirstName], a knight of a holy order, has come to your court. He proposes that his brethren garrison [frontier_county.GetName] — in exchange for lands, gold, or simply the favor of God."
 rse_crusade.0002.a:0 "Grant them the garrison. The frontier needs them."
 rse_crusade.0002.b:0 "Give gold to the order's coffers. (-100 gold)"
 rse_crusade.0002.c:0 "Refuse. These knights answer to no liege but their grandmaster."

 rse_crusade.0003.t:0 "A Saracen Raid"
 rse_crusade.0003.desc:0 "Riders sweep across [raided_county.GetName] — Saracen horsemen from across the border, paying back our conquest in blood and fire."
 rse_crusade.0003.a:0 "Mount the cross — give chase! (-100 gold)"
 rse_crusade.0003.b:0 "Let the Muslim villages burn. They were never truly ours."
 rse_crusade.0003.c:0 "Fortify the marches. (-50 gold)"

 rse_crusade.0004.t:0 "The Faithful Will Not Bow"
 rse_crusade.0004.desc:0 "[muslim_rebel_county.GetName] grows restless. The muezzin's call goes unanswered, the mosques are silent — and the men gather in the alleys with steel hidden in their robes."
 rse_crusade.0004.a:0 "Convert them — by sword if they will not by sermon."
 rse_crusade.0004.b:0 "Expel them. Let the land be reborn."
 rse_crusade.0004.c:0 "Grant them peace. Tolerance is a Christian virtue."

 rse_heresy.0001.t:0 "A Heretical Preacher"
 rse_heresy.0001.desc:0 "[heretic_preacher.GetTitledFirstName] preaches in the markets of [preacher_county.GetName]. His doctrines twist the true faith — yet the people gather to listen, hungry for new words."
 rse_heresy.0001.a:0 "Burn the heretic. Let his ashes warn the rest."
 rse_heresy.0001.b:0 "Banish him from our lands."
 rse_heresy.0001.c:0 "Send for him. I would hear his arguments."

 rse_heresy.0002.t:0 "A Council on Doctrine"
 rse_heresy.0002.desc:0 "[learned_theologian.GetTitledFirstName] proposes you summon a council to settle a doctrinal dispute that has divided the clergy. The faithful look to you for an answer."
 rse_heresy.0002.a:0 "Call the council. I shall name the truth. (-100 piety)"
 rse_heresy.0002.b:0 "Let the clergy debate it themselves."
 rse_heresy.0002.c:0 "Neither side is wholly right. Silence them all."

 rse_heresy.0003.t:0 "A Mystic in the Hills"
 rse_heresy.0003.desc:0 "[mystic.GetTitledFirstName] dwells in a cave near [mystic_county.GetName]. Some pilgrims say he speaks with angels. Others say he speaks with devils. He asks nothing — only to be left alone."
 rse_heresy.0003.a:0 "Bring him to court. Such wisdom is rare."
 rse_heresy.0003.b:0 "Drag him out and execute him."
 rse_heresy.0003.c:0 "Visit him in secret. I would hear his words."

 rse_heresy.0004.t:0 "A Vassal Falls to Heresy"
 rse_heresy.0004.desc:0 "[heretic_vassal.GetTitledFirstName] has been seen at heretical meetings — and worse, has begun to profess the heresy openly. A rot at the heart of the realm."
 rse_heresy.0004.a:0 "Throw them in the dungeon."
 rse_heresy.0004.b:0 "Watch them closely. A wise ruler does not strike in haste."
 rse_heresy.0004.c:0 "Bribe their court chaplain to bring them back. (-75 gold)"

 rse_relic.0001.t:0 "A Holy Relic for Sale"
 rse_relic.0001.desc:0 "[relic_merchant.GetTitledFirstName] presents a gilded reliquary, claiming it contains a bone of a saint, a fragment of the true cross — or perhaps a hair of the Prophet. He names a steep price."
 rse_relic.0001.a:0 "Purchase the relic. (-200 gold)"
 rse_relic.0001.b:0 "This is a fraud. Have him driven out."
 rse_relic.0001.c:0 "Refuse politely. The faith does not need gilded bones."

 rse_relic.0002.t:0 "The Pilgrim Returns"
 rse_relic.0002.desc:0 "[pilgrim.GetTitledFirstName] has returned from a long pilgrimage to a great holy site. Their face is gaunt but their eyes blaze with a strange fire. They beg an audience."
 rse_relic.0002.a:0 "Welcome them as a brother in faith."
 rse_relic.0002.b:0 "Reward their devotion with gold. (-50 gold)"
 rse_relic.0002.c:0 "Pilgrims breed unrest. Send them away."

 rse_relic.0003.t:0 "A Miracle Witnessed"
 rse_relic.0003.desc:0 "Word from [miracle_county.GetName]: a peasant girl is said to have wept tears of blood before an icon, and a lame child rose to walk. Crowds are gathering."
 rse_relic.0003.a:0 "Proclaim it a true miracle! Build a shrine."
 rse_relic.0003.b:0 "Investigate. We shall not be deceived."
 rse_relic.0003.c:0 "Charge a toll on the pilgrims. (+75 gold)"

 rse_relic.0004.t:0 "A Summons From the Pontiff"
 rse_relic.0004.desc:0 "[pontiff.GetTitledFirstName], head of our faith, has sent a letter demanding tribute for the holy wars. The seal is heavy. Your treasurer winces."
 rse_relic.0004.a:0 "Pay the tribute, gladly. (-150 gold)"
 rse_relic.0004.b:0 "Refuse. We owe nothing."
 rse_relic.0004.c:0 "Let the chaplain craft a diplomatic reply."

 rse_pagan.0001.t:0 "A Sacred Grove"
 rse_pagan.0001.desc:0 "In the forests of [grove_county.GetName], your foresters have discovered an ancient grove — bones and offerings hung from the branches, an altar still smeared with blood. The old gods are not yet dead."
 rse_pagan.0001.a:0 "Burn it to the roots."
 rse_pagan.0001.b:0 "Leave it be. Some things are older than us."
 rse_pagan.0001.c:0 "Build a chapel on the site. (-50 gold)"

 rse_pagan.0002.t:0 "Heathens in My Lands"
 rse_pagan.0002.desc:0 "The villagers of [pagan_village.GetName] swear by the true faith on Sundays — but on the dark of the moon, they slip into the woods to leave offerings to older gods."
 rse_pagan.0002.a:0 "Send a missionary. Patience converts more than swords. (-25 gold)"
 rse_pagan.0002.b:0 "March in with steel. End it now."
 rse_pagan.0002.c:0 "Let them keep both. Faith is a private matter."

 rse_pagan.0003.t:0 "A Heathen at the Gate"
 rse_pagan.0003.desc:0 "[pagan_warrior.GetTitledFirstName], a warrior from the cold north who has not heard the true word, has come to offer his sword. He is famous, fierce — and a pagan."
 rse_pagan.0003.a:0 "Accept his service. A sword cares not for the soul."
 rse_pagan.0003.b:0 "Service for a price — baptism first."
 rse_pagan.0003.c:0 "Drive him out. We have no need of heathens."

 rse_jewish.0001.t:0 "The Jewish Quarter Petitions"
 rse_jewish.0001.desc:0 "[jewish_elder.GetTitledFirstName], elder of the Jewish community of [jewish_quarter.GetName], has come bearing gifts and a petition. The Jews of your domain ask for a writ of protection."
 rse_jewish.0001.a:0 "Grant the writ. Their trade enriches us all."
 rse_jewish.0001.b:0 "Protection — for a special tax. (+150 gold)"
 rse_jewish.0001.c:0 "Expel them all. Their gold first, then their backs."

 rse_jewish.0002.t:0 "A Loan in Hard Times"
 rse_jewish.0002.desc:0 "[moneylender.GetTitledFirstName], a Jewish moneylender, has heard of your empty coffers. He offers a loan at moderate interest, with only your seal as collateral."
 rse_jewish.0002.a:0 "Take the loan. (+300 gold)"
 rse_jewish.0002.b:0 "Take it — then take his head. The debt dies with him. (+200 gold)"
 rse_jewish.0002.c:0 "Refuse. I will not bow to usury."

 rse_jewish.0003.t:0 "Pogrom in the Streets"
 rse_jewish.0003.desc:0 "A traveling preacher has whipped the peasants of [pogrom_county.GetName] into fury against the Jews. Torches gather at dusk. They wait only for your nod — or your forbidding."
 rse_jewish.0003.a:0 "Send guards to protect the quarter."
 rse_jewish.0003.b:0 "Let the mob act — and seize the spoils. (+100 gold)"
 rse_jewish.0003.c:0 "Stay silent. The matter does not concern us."

 rse_faith.0001.t:0 "A Crisis of Faith"
 rse_faith.0001.desc:0 "On a long, sleepless night, you find yourself asking: do the prayers still mean what they once did? You have ruled, you have bled, you have buried — but does the heaven you were promised still wait?"
 rse_faith.0001.a:0 "Renew my vows. Pray harder than ever."
 rse_faith.0001.b:0 "Admit it: I no longer believe."
 rse_faith.0001.c:0 "Bury the question. There is no time for it."

 rse_faith.0002.t:0 "A Vow Before God"
 rse_faith.0002.desc:0 "The chaplain proposes that you take a great vow before the altar — a binding of your will to God, a public sign of your devotion. Which vow shall you take?"
 rse_faith.0002.a:0 "A vow of chastity."
 rse_faith.0002.b:0 "A vow of poverty. (-100 gold)"
 rse_faith.0002.c:0 "A vow of pilgrimage."
 rse_faith.0002.d:0 "No vow. Words are wind."

 rse_faith.0003.t:0 "A Foreign Holy Man"
 rse_faith.0003.desc:0 "[foreign_holy_man.GetTitledFirstName], a learned man of another faith, has been a guest at your court for weeks. He has spoken with you long into the night — and now he asks: would you not consider his faith?"
 rse_faith.0003.a:0 "Send him away at once. I will not be tempted."
 rse_faith.0003.b:0 "He speaks the truth... I will convert."
 rse_faith.0003.c:0 "Let him stay. To hear is not to agree."

 rse_anathema.0001.t:0 "The Threat of Anathema"
 rse_anathema.0001.desc:0 "A messenger from [pontiff.GetTitledFirstName] arrives, bearing a letter sealed with red wax. It warns that your insufficient piety has caught the attention of the head of the faith — and that anathema may follow unless you repent."
 rse_anathema.0001.a:0 "Send a generous offering. (-100 gold)"
 rse_anathema.0001.b:0 "Walk barefoot to the cathedral. Show humility."
 rse_anathema.0001.c:0 "Let them try. I rule here, not them."

 rse_anathema.0002.t:0 "A Rival Falls From Grace"
 rse_anathema.0002.desc:0 "Word arrives: [fallen_rival.GetTitledFirstName] has been excommunicated by the head of our faith. The realm is in uproar. The opportunity is yours to take — or to spurn."
 rse_anathema.0002.a:0 "Denounce them publicly! Press the advantage."
 rse_anathema.0002.b:0 "Stand with them in their hour of need."
 rse_anathema.0002.c:0 "Watch from the shadows. The matter is not mine."

 rse_anathema.0003.t:0 "A Zealot Seeks Martyrdom"
 rse_anathema.0003.desc:0 "[zealot.GetTitledFirstName], a fervent member of your court, has begged audience. They wish to go on a perilous mission to convert the infidels — knowing well it will likely cost them their life."
 rse_anathema.0003.a:0 "Fund their mission. May the Lord be with them. (-75 gold)"
 rse_anathema.0003.b:0 "Have them put to death — quietly. Such fanatics are dangerous."
 rse_anathema.0003.c:0 "Refuse — and send them from court."

 rse_slave.0001.t:0 "A Slave Market in the Domain"
 rse_slave.0001.desc:0 "[slave_trader.GetTitledFirstName] proposes opening a slave market in [market_county.GetName]. Saqaliba from the north, Zanj from the south, prisoners of war from every front — all changing hands for silver."
 rse_slave.0001.a:0 "Let it open. The coin will flow."
 rse_slave.0001.b:0 "No slave trade in my lands. Send him away."
 rse_slave.0001.c:0 "Open it, but heavily regulated. No co-religionists."

 rse_slave.0002.t:0 "A Slave Caravan Arrives"
 rse_slave.0002.desc:0 "[slaver.GetTitledFirstName] leads a chained caravan into the courtyard. Among them, [saqlabi.GetTitledFirstName], a fair-haired captive from the Slavic lands, is offered first. He names his price."
 rse_slave.0002.a:0 "Buy them. They will serve. (-75 gold)"
 rse_slave.0002.b:0 "Buy them, baptize them, raise them up. (-150 gold)"
 rse_slave.0002.c:0 "Drive the caravan from my gates."

 rse_slave.0003.t:0 "Found a Mamluk Corps"
 rse_slave.0003.desc:0 "[mamluk_commander.GetTitledFirstName], a Cuman boy taken in war and raised to manhood as a warrior of Islam, kneels before you. He proposes a corps of military slaves — fanatically loyal, bound to no clan, sworn only to you."
 rse_slave.0003.a:0 "Found the corps. They will be my iron arm. (-200 gold)"
 rse_slave.0003.b:0 "Free men serve me. The corps shall not be."

 rse_slave.0004.t:0 "A Slave Revolt"
 rse_slave.0004.desc:0 "Smoke rises from [revolt_county.GetName]. The slaves have risen — overseers butchered, irons cast off, the storehouses ablaze. They demand freedom, or death."
 rse_slave.0004.a:0 "Crush them. Hang every survivor. (-75 gold)"
 rse_slave.0004.b:0 "Free them. Settle them on the land."
 rse_slave.0004.c:0 "Buy them off — promise better conditions. (-40 gold)"

 rse_slave.0005.t:0 "An Act of Manumission"
 rse_slave.0005.desc:0 "[freedman.GetTitledFirstName], an old household slave, kneels before you. The chaplain says it would please God to free him. The steward says it would deprive the household of a useful servant."
 rse_slave.0005.a:0 "Free them. May God see this and remember."
 rse_slave.0005.b:0 "Sell them at a profit. (+50 gold)"
 rse_slave.0005.c:0 "Cast them out. I have no further use."

 rse_slave.0006.t:0 "Christians for Ransom"
 rse_slave.0006.desc:0 "A delegation of Trinitarian monks arrives. They beg you to fund the ransom of Christian captives held in Saracen slave markets. The price is steep — but each soul saved is a soul saved."
 rse_slave.0006.a:0 "Ransom them all. (-150 gold)"
 rse_slave.0006.b:0 "Ransom what I can afford. (-50 gold)"
 rse_slave.0006.c:0 "I cannot. The realm needs every coin."

 rse_slave.0007.t:0 "Thralls From the Raid"
 rse_slave.0007.desc:0 "Your raiders return with a longboat full of thralls — men and women in chains, bound for the labour of [thrall_county.GetName]. The chieftains await your word."
 rse_slave.0007.a:0 "Put them to work. The fields hunger."
 rse_slave.0007.b:0 "Free them. They shall be freedmen, not chattel."
 rse_slave.0007.c:0 "Sell them all at market. (+200 gold)"

 rse_slave.0008.t:0 "The Favoured Concubine"
 rse_slave.0008.desc:0 "[concubine.GetTitledFirstName], brought into your household as a slave, has grown close to your heart. The chaplain suggests an act of manumission would honour both you and God."
 rse_slave.0008.a:0 "Free them. Their devotion deserves no less."
 rse_slave.0008.b:0 "They remain mine. Affection is no cause for foolishness. (+50 gold)"
 rse_slave.0008.c:0 "Send them away. I will not be tempted."

 rse_reconquest.0007.t:0 "A Christian Lord Submits"
 rse_reconquest.0007.desc:0 "[christian_noble.GetTitledFirstName], scion of an old Christian house in [noble_county.GetName], comes to your court with bowed head. He offers his sword, his banner, and his loyalty — if only you let him keep his ancestral lands."
 rse_reconquest.0007.a:0 "Accept his oath. A useful collaborator."
 rse_reconquest.0007.b:0 "He may keep his land — but he must take the shahada."
 rse_reconquest.0007.c:0 "The old blood must go. The block awaits."

 rse_reconquest.0008.t:0 "Bell Tower or Minaret"
 rse_reconquest.0008.desc:0 "The great cathedral of [cathedral_county.GetName] stands at the heart of the city — its bells still rung by Christian hands. The imams demand it be claimed for Allah. What is to be done?"
 rse_reconquest.0008.a:0 "Convert it into a grand mosque. (-100 gold)"
 rse_reconquest.0008.b:0 "Share it — Friday for us, Sunday for them."
 rse_reconquest.0008.c:0 "Tear it down. Stone by stone."

 rse_reconquest.0009.t:0 "A Saint's Relics"
 rse_reconquest.0009.desc:0 "In a vault beneath [relic_county.GetName] lie the relics of an old Christian saint — bones in a gilded reliquary, said to work miracles. The Christians still come to pray. The treasury looks hungry."
 rse_reconquest.0009.a:0 "Strip the gold. The bones are worthless. (+200 gold)"
 rse_reconquest.0009.b:0 "Leave the shrine in peace. We are not barbarians."
 rse_reconquest.0009.c:0 "Burn the bones. Their saint shall trouble us no more."

 rse_reconquest.0010.t:0 "A Captive Noblewoman"
 rse_reconquest.0010.desc:0 "[noblewoman.GetTitledFirstName], a noblewoman of the Christian lands, was taken in the last campaign. She kneels before you, awaiting your judgment — to be ransomed, to be wed to the faith, or to be sold."
 rse_reconquest.0010.a:0 "Ransom her to her kin. (+100 gold)"
 rse_reconquest.0010.b:0 "Free her — if she takes the shahada."
 rse_reconquest.0010.c:0 "She shall serve in my household. (+50 gold)"

 rse_reconquest.0011.t:0 "A Petition for Millet"
 rse_reconquest.0011.desc:0 "[millet_leader.GetTitledFirstName], a leader of the Christians of [millet_county.GetName], begs that his people be allowed to govern their own affairs — their courts, their schools, their laws — under your supreme authority."
 rse_reconquest.0011.a:0 "Grant the millet. Let each people live as they will."
 rse_reconquest.0011.b:0 "No. They live under our law, like every subject."
 rse_reconquest.0011.c:0 "Sell the right of self-rule. (+75 gold)"

 rse_reconquest.0012.t:0 "The Christian Boy"
 rse_reconquest.0012.desc:0 "[christian_boy.GetTitledFirstName], a Christian boy taken from [devshirme_county.GetName], has been brought to your court. Bright eyes, sharp wit — the makings of a future servant of the empire."
 rse_reconquest.0012.a:0 "Raise him as a Muslim. He shall be one of us."
 rse_reconquest.0012.b:0 "Educate him at court. Let him keep his faith."
 rse_reconquest.0012.c:0 "Return him to his people."

 rse_reconquest.0013.t:0 "A Sufi at the Door"
 rse_reconquest.0013.desc:0 "[sufi.GetTitledFirstName], a wandering Sufi mystic, has come to your court. He proposes to build a lodge in [sufi_county.GetName] and to win the hearts of the Christians by gentleness — not the sword."
 rse_reconquest.0013.a:0 "Fund the lodge. Let love do what steel cannot. (-50 gold)"
 rse_reconquest.0013.b:0 "The sword is faster. Drive him out."
 rse_reconquest.0013.c:0 "Let him try, but expect nothing of it."

 rse_reconquest.0014.t:0 "Christian Sails on the Horizon"
 rse_reconquest.0014.desc:0 "Smoke rises from the coast of [coastal_county.GetName] — a Christian fleet, perhaps from across the sea, has raided the village. The dispossessed Christian families of the county may have welcomed them."
 rse_reconquest.0014.a:0 "Garrison the coast. (-75 gold)"
 rse_reconquest.0014.b:0 "Take Christian hostages from the local notables."
 rse_reconquest.0014.c:0 "Let the loss stand. It is the cost of empire."

 rse_reconquest.0015.t:0 "A Mass in the Catacombs"
 rse_reconquest.0015.desc:0 "Beneath the streets of [vault_county.GetName], your spies have found a vaulted chamber where Christians still gather to celebrate Mass — by candlelight, in whispers, when they think themselves unseen."
 rse_reconquest.0015.a:0 "Seal the catacombs. Brick by brick."
 rse_reconquest.0015.b:0 "Pretend not to know. A quiet faith is no faith at all."
 rse_reconquest.0015.c:0 "Find them all — and triple their jizya."

 rse_reconquest.0016.t:0 "An Ascetic Demands Severity"
 rse_reconquest.0016.desc:0 "[ascetic.GetTitledFirstName], a desert ascetic gaunt with fasting, has come to your court. He denounces your tolerance — the unveiled Christians, the unbroken bells, the dhimmis who walk too proudly. The faith, he declares, is being lost."
 rse_reconquest.0016.a:0 "He speaks the truth. Tighten the screws."
 rse_reconquest.0016.b:0 "Fanatics are dangerous. Drive him out."
 rse_reconquest.0016.c:0 "Behead him for impudence. I am the law here."

 rse_reconquest.0017.t:0 "A Marriage of Two Worlds"
 rse_reconquest.0017.desc:0 "The notables of [bride_county.GetName] propose a marriage — [christian_bride.GetTitledFirstName], of the old Christian nobility, to enter your household. The match would legitimize your rule among the conquered."
 rse_reconquest.0017.a:0 "Accept. Let two worlds become one through marriage."
 rse_reconquest.0017.b:0 "Only after conversion. The shahada first, the bed after."
 rse_reconquest.0017.c:0 "Refuse. My blood will not mingle with theirs."

 rse_reconquest.0018.t:0 "An Apostate Flees"
 rse_reconquest.0018.desc:0 "[apostate.GetTitledFirstName], a recent convert to Islam, has been caught at the border with a cross hidden in his robe. He was fleeing back to Christendom — to die as a Christian, he says."
 rse_reconquest.0018.a:0 "Death is the price of apostasy. Behead him."
 rse_reconquest.0018.b:0 "Imprison him. Perhaps prayer will save his soul."
 rse_reconquest.0018.c:0 "Let him go. A forced convert is no convert at all."

 rse_reconquest.0019.t:0 "Rebuild the City"
 rse_reconquest.0019.desc:0 "[ruined_county.GetName] still bears the scars of conquest — burned quarters, collapsed walls, a populace half-fled. Rebuilding could win hearts, or empty the treasury."
 rse_reconquest.0019.a:0 "A grand rebuilding — gardens, fountains, all of it. (-200 gold)"
 rse_reconquest.0019.b:0 "Patch what is broken. (-100 gold)"
 rse_reconquest.0019.c:0 "Let it rot. We have new lands to conquer."

 rse_reconquest.0020.t:0 "A Debate of Faiths"
 rse_reconquest.0020.desc:0 "[debater_priest.GetTitledFirstName], a learned priest, has come from across the border, offering a public debate with [court_imam.GetTitledFirstName] over the merits of their faiths. The court is gathered, the wine is poured, and curiosity holds the room."
 rse_reconquest.0020.a:0 "There is no debate. Take his head."
 rse_reconquest.0020.b:0 "Let him speak. A wise ruler listens to all."
 rse_reconquest.0020.c:0 "He has been bested. Let him take the shahada — or die."

 rse_captive.0001.t:0 "Iron and Straw"
 rse_captive.0001.desc:0 "The cell is cold, the straw foul, and [captor.GetTitledFirstName]'s guards regard you with open contempt. The first days in chains will set the tone for the rest."
 rse_captive.0001.a:0 "Slip silver to the jailers. (-50 gold)"
 rse_captive.0001.b:0 "Endure with dignity. They shall see no weakness."
 rse_captive.0001.c:0 "Plead for mercy. I am no warrior."

 rse_captive.0002.t:0 "Convert or Rot"
 rse_captive.0002.desc:0 "[captor.GetTitledFirstName] visits your cell with an offer: renounce your faith, embrace theirs, and walk free this very hour. Refuse, and rot."
 rse_captive.0002.a:0 "Convert. Survival comes first."
 rse_captive.0002.b:0 "Never. I die in my faith."
 rse_captive.0002.c:0 "Pretend to convert — I shall recant the moment I am free."

 rse_captive.0003.t:0 "An Open Door"
 rse_captive.0003.desc:0 "A guard's careless hand, a bribed servant, an unlocked grate — circumstances align. An escape attempt could be made, if you have the nerve."
 rse_captive.0003.a:0 "Run for it!"
 rse_captive.0003.b:0 "Wait. The moment is not yet right."

 rse_captive.0004.t:0 "A Visitor by Candlelight"
 rse_captive.0004.desc:0 "[visitor.GetTitledFirstName], one of [captor.GetTitledFirstName]'s own household, slips into your cell by candlelight. They speak softly — they pity you, they say. They might help, for a price... or for nothing at all."
 rse_captive.0004.a:0 "Accept their friendship gratefully."
 rse_captive.0004.b:0 "Refuse. I will owe nothing to my captor's kin."
 rse_captive.0004.c:0 "Report them to the captor."

 rse_captive.0005.t:0 "Sign Away Your Lands"
 rse_captive.0005.desc:0 "[captor.GetTitledFirstName] enters the cell with a scroll. The terms are written: surrender a county, and walk free. Refuse, and rot until your bones bleach."
 rse_captive.0005.a:0 "Sign. A title is no use to a corpse."
 rse_captive.0005.b:0 "Never. They shall pry the seal from my dead hand."

 rse_captive.0006.t:0 "A Cellmate's Whisper"
 rse_captive.0006.desc:0 "[cellmate.GetTitledFirstName], who shares your cell, has been here longer. They know the rhythms of the guards, the weak walls, the bribable cook. They propose a joint escape."
 rse_captive.0006.a:0 "Try the escape together."
 rse_captive.0006.b:0 "Use what they know to bribe the jailers myself."
 rse_captive.0006.c:0 "Betray them to the captor. The information has value."

 rse_captive.0007.t:0 "A Slaver's Bargain"
 rse_captive.0007.desc:0 "[captor.GetTitledFirstName] no longer wishes the trouble of holding you. The choice they offer is plain: pay a steep ransom, become a slave, or remain forever in this cell."
 rse_captive.0007.a:0 "Pay the ransom. (-150 gold)"
 rse_captive.0007.b:0 "Take the chains. Better a slave than dead."
 rse_captive.0007.c:0 "Defy them both. I am no chattel."

 rse_bondage.0001.t:0 "The First Days in Chains"
 rse_bondage.0001.desc:0 "The collar weighs on the neck. [master.GetTitledFirstName]'s household is a strange new world — masters and overseers, fellow slaves and house servants. How you carry yourself now will set the tone for years to come."
 rse_bondage.0001.a:0 "Endure with dignity. They shall not break me."
 rse_bondage.0001.b:0 "Earn my place. Be useful, be trusted."
 rse_bondage.0001.c:0 "Bow my head — but never my heart."

 rse_bondage.0002.t:0 "Summoned to the Bedchamber"
 rse_bondage.0002.desc:0 "A servant comes for you at dusk: [master.GetTitledFirstName] desires your company tonight. The choice is yours in name only — but how you answer the call will shape what follows."
 rse_bondage.0002.a:0 "Submit. Perhaps favour can be earned this way."
 rse_bondage.0002.b:0 "Refuse — and accept the lash for it."
 rse_bondage.0002.c:0 "Submit, smile, and plot. Time is on my side."

 rse_bondage.0003.t:0 "The Master's Spouse"
 rse_bondage.0003.desc:0 "[jealous_spouse.GetTitledFirstName] confronts you in the corridor. There is no shouting — only quiet, deadly words. They will not share their bed. Soon, the master will hear of you. Or you of them."
 rse_bondage.0003.a:0 "Hold my ground. The master favours me."
 rse_bondage.0003.b:0 "Apologize. Offer to step aside."
 rse_bondage.0003.c:0 "Smile and bow — and begin to plan."

 rse_bondage.0004.t:0 "Whispers in the Slave Quarters"
 rse_bondage.0004.desc:0 "[fellow_slave.GetTitledFirstName] approaches you in the dark of the slave quarters. They have a plan — a way through the kitchen door, past the stables, into the wood beyond. Will you risk it?"
 rse_bondage.0004.a:0 "Run with them, into the night."
 rse_bondage.0004.b:0 "Refuse — but keep the secret."
 rse_bondage.0004.c:0 "Tell the master. Loyalty earns rewards."

 rse_bondage.0005.t:0 "A Plea for Freedom"
 rse_bondage.0005.desc:0 "At last, the moment comes: alone with [master.GetTitledFirstName], you find the words. You beg for freedom — for the chance to walk out of these walls as your own person."
 rse_bondage.0005.a:0 "Beg openly. Trust to mercy."
 rse_bondage.0005.b:0 "Withdraw the words. Better to wait than to grovel."

 rse_bondage.0006.t:0 "A Child of the Master"
 rse_bondage.0006.desc:0 "The midwife confirms what you have feared — and hoped. [master.GetTitledFirstName]'s child grows within you. The household will know soon enough. What you say first will decide much."
 rse_bondage.0006.a:0 "Tell the master. A child is power."
 rse_bondage.0006.b:0 "Conceal it as long as possible."
 rse_bondage.0006.c:0 "There are women in this house who know herbs..."

 rse_bondage.0007.t:0 "Sold"
 rse_bondage.0007.desc:0 "Coins change hands. [old_master.GetTitledFirstName] has sold you to [new_master.GetTitledFirstName]. A new household, a new collar, the same chains. What kind of slave will you be this time?"
 rse_bondage.0007.a:0 "Begin again. Be useful from the first day."
 rse_bondage.0007.b:0 "Defy the new master at every step."

 rse_bondage.0008.t:0 "The Master Falls Ill"
 rse_bondage.0008.desc:0 "[master.GetTitledFirstName] has taken to bed, racked with fever. The household is in disarray, the cook calls for a slave to bring soup and tend the master in the long nights. You are summoned."
 rse_bondage.0008.a:0 "Nurse them faithfully. Loyalty may be remembered."
 rse_bondage.0008.b:0 "A little something in the soup, perhaps..."
 rse_bondage.0008.c:0 "Do my duty. Nothing more, nothing less."

 rse_bondage.0009.t:0 "The Master's Heir"
 rse_bondage.0009.desc:0 "[heir.GetTitledFirstName], child of [master.GetTitledFirstName], has begun to find excuses to be near you. Their eyes linger; their hand brushes yours. A new game has begun, and you are again the prize."
 rse_bondage.0009.a:0 "Welcome the attention. The heir is the future."
 rse_bondage.0009.b:0 "Coldly turn them away. The master is the master."
 rse_bondage.0009.c:0 "Encourage them in secret — a card to play."

 rse_bondage.0010.t:0 "Sing for the Court"
 rse_bondage.0010.desc:0 "The feast is in full clamour. The master claps his hands and points at you — sing, dance, do something pretty for the guests. The hall falls quiet, waiting."
 rse_bondage.0010.a:0 "Perform with all my grace."
 rse_bondage.0010.b:0 "Stand silent. They shall have no entertainment from me."
 rse_bondage.0010.c:0 "Perform — and listen carefully to what is said around me."

 rse_bondage.0011.t:0 "Caught with the Coin"
 rse_bondage.0011.desc:0 "The steward catches you with a handful of silver from the kitchen jar. The household freezes. The master will be told. Your story had better be ready."
 rse_bondage.0011.a:0 "Lie. Blame the cook."
 rse_bondage.0011.b:0 "Confess and beg forgiveness."
 rse_bondage.0011.c:0 "Stay silent. Let the master decide."

 rse_bondage.0012.t:0 "A Guest's Offer"
 rse_bondage.0012.desc:0 "[visiting_noble.GetTitledFirstName], a noble from a distant court, has been watching you all evening. Late in the night, they corner you and make an offer: come away with them, and a new collar will follow — but a softer one."
 rse_bondage.0012.a:0 "Accept. Anything but here."
 rse_bondage.0012.b:0 "Refuse. Better the master I know."
 rse_bondage.0012.c:0 "Listen carefully — and remember the name."

 rse_bondage.0013.t:0 "A Pilgrim from Home"
 rse_bondage.0013.desc:0 "[pilgrim.GetTitledFirstName], a pilgrim of your own faith and tongue, has been granted alms at the gate. They speak softly to you — news of your homeland, of names you remember, of a world that still exists beyond these walls."
 rse_bondage.0013.a:0 "Receive their blessing. Pray with them."
 rse_bondage.0013.b:0 "Beg them to carry a message home."
 rse_bondage.0013.c:0 "Report them. A faithful slave does not weep for home."

 rse_bondage.0014.t:0 "The Master is Dead"
 rse_bondage.0014.desc:0 "The bell tolls — the master is gone. [new_master.GetTitledFirstName] now holds the keys to your collar. What kind of slave will you choose to be in this new house?"
 rse_bondage.0014.a:0 "Pledge service. A new master, a new beginning."
 rse_bondage.0014.b:0 "Beg the new master for freedom in their grief."
 rse_bondage.0014.c:0 "Slip away in the confusion."

 rse_bondage.0015.t:0 "Holy Charity at the Gate"
 rse_bondage.0015.desc:0 "[holy_man.GetTitledFirstName], a holy man of your own faith, has come bearing alms — gold gathered by the faithful to ransom slaves of the true faith from the infidels. He looks at you with hope, and at [master.GetTitledFirstName] with patience."
 rse_bondage.0015.a:0 "Beg the master to accept the ransom!"
 rse_bondage.0015.b:0 "Pray with the holy man. Faith first, freedom second."
 rse_bondage.0015.c:0 "Convert to the master's faith. End the bargain."

 rse_bondage.0016.t:0 "Into the Sand"
 rse_bondage.0016.desc:0 "Steel is pressed into your hand. The gate creaks open. Beyond, sand, sun, a crowd hungry for blood — and another slave with a blade, just as desperate as you. [master.GetTitledFirstName] watches from the loge."
 rse_bondage.0016.a:0 "Fight to win. The crowd loves a survivor."
 rse_bondage.0016.b:0 "Refuse to draw blood. Let them take their show elsewhere."

 rse_bondage.0017.t:0 "The Pit and the Oar"
 rse_bondage.0017.desc:0 "You are assigned to the deepest part of [master.GetTitledFirstName]'s holdings — a mine, a quarry, a galley bench. Years of toil promise to bend your back into a question mark."
 rse_bondage.0017.a:0 "Bend the back. Endure."
 rse_bondage.0017.b:0 "Slip away into the dark."
 rse_bondage.0017.c:0 "Pray. The Lord watches over the broken."

 rse_bondage.0018.t:0 "A Mamluk's Path"
 rse_bondage.0018.desc:0 "[drillmaster.GetTitledFirstName] inspects you with a soldier's eye. You have the shoulders, the speed, the hardness for it — would you accept training as a mamluk, a warrior-slave of the faith?"
 rse_bondage.0018.a:0 "Accept. Take the shahada and the sword."
 rse_bondage.0018.b:0 "Refuse. I shall die in my own faith."
 rse_bondage.0018.c:0 "Accept the sword — and keep the faith in secret."

 rse_bondage.0019.t:0 "The Knife"
 rse_bondage.0019.desc:0 "The master has decided: you are too useful and too dangerous to leave whole. The harem needs a guard. The knife is prepared. The only question is whether you walk to it on your own feet."
 rse_bondage.0019.a:0 "Submit. The cut is short; the life that follows is long."
 rse_bondage.0019.b:0 "Bribe the surgeon to spare me. (-100 gold)"
 rse_bondage.0019.c:0 "Fight my way out — I shall not be gelded!"

 rse_bondage.0020.t:0 "The Whip in Your Hand"
 rse_bondage.0020.desc:0 "The old overseer has died. [master.GetTitledFirstName] looks down the line and points at you — you shall take the whip now. You shall keep the others in line. The choice is yours: become the lash, or refuse and feel it."
 rse_bondage.0020.a:0 "Take the whip. Survive by ruling."
 rse_bondage.0020.b:0 "Refuse. I will not become what I despise."
 rse_bondage.0020.c:0 "Take it — and use it carefully. Some slaves are useful allies."

 rse_bondage.0021.t:0 "The Master's Daughter"
 rse_bondage.0021.desc:0 "[daughter.GetTitledFirstName], the master's grown daughter, has begun finding you in the garden, in the corridor, in the orchard. She is bold. She is reckless. And she is the master's blood."
 rse_bondage.0021.a:0 "Meet her gaze. Whatever comes, comes."
 rse_bondage.0021.b:0 "Refuse her firmly. Save us both."
 rse_bondage.0021.c:0 "Report her to the master."

 rse_bondage.0022.t:0 "Iron and Fire"
 rse_bondage.0022.desc:0 "[fellow_slave.GetTitledFirstName] presses an iron bar into your palm. Tonight, a dozen slaves rise — overseers slain, gates open, freedom beyond the wall. They want you to lead. They will follow."
 rse_bondage.0022.a:0 "Lead the rising. Iron and fire!"
 rse_bondage.0022.b:0 "Refuse — but keep the secret."
 rse_bondage.0022.c:0 "Warn the master. Earn a place at the table."

 rse_christslav.0001.t:0 "Slavs in Chains"
 rse_christslav.0001.desc:0 "[slav_merchant.GetTitledFirstName], a slaver returning from the Wendish frontier, has brought a coffle of captives to the gates of [market_county.GetName]. The Slavs are pagans, and our laws say much about them. Coin says more."
 rse_christslav.0001.a:0 "Buy them. Pagan flesh fetches a fair price. (-75 gold)"
 rse_christslav.0001.b:0 "Buy and baptize. Slaves of Christ, not of mine. (-100 gold)"
 rse_christslav.0001.c:0 "Drive the slaver out. This is a Christian land."

 rse_christslav.0002.t:0 "The Italian Trader"
 rse_christslav.0002.desc:0 "[italian_trader.GetTitledFirstName], a Genoese merchant, requests a charter to operate a slave market from the port of [port_county.GetName]. The trade is lucrative, the Slavs are plentiful — and the Saracens of the south pay in pure gold."
 rse_christslav.0002.a:0 "Grant the charter. Let coin flow."
 rse_christslav.0002.b:0 "Regulate it. Only pagans may be sold."
 rse_christslav.0002.c:0 "Refuse. My ports shall not become slave markets."

 rse_christslav.0003.t:0 "A Papal Bull"
 rse_christslav.0003.desc:0 "[pontiff.GetTitledFirstName] has issued a bull denouncing the slave markets that flourish in [denounced_county.GetName]. He demands you shut them down — under threat of excommunication."
 rse_christslav.0003.a:0 "Obey. Close the markets. (-100 gold)"
 rse_christslav.0003.b:0 "Defy the bull. Rome rules in Rome."
 rse_christslav.0003.c:0 "Negotiate. Reform, not abolish."

 rse_christslav.0004.t:0 "Baptize the Bondsmen"
 rse_christslav.0004.desc:0 "[court_chaplain.GetTitledFirstName] presses you on a theological question: [pagan_slave.GetTitledFirstName], a pagan slave in your household, is a candidate for baptism. Some say a Christian cannot hold a Christian slave. Others say the soul is freed even if the body remains bound."
 rse_christslav.0004.a:0 "Baptize and free. Both body and soul."
 rse_christslav.0004.b:0 "Baptize, but keep them in service."
 rse_christslav.0004.c:0 "Forbid baptism. Slaves they came, slaves they shall remain."

 rse_christslav.0005.t:0 "Across the Wendish Frontier"
 rse_christslav.0005.desc:0 "[slavic_neighbor.GetTitledFirstName]'s lands lie open, the Slavic villages undefended. A raid would yield captives, ransoms, and a strong message to the heathen across the border."
 rse_christslav.0005.a:0 "Send the riders. Take what we can. (+200 gold, 2 slaves)"
 rse_christslav.0005.b:0 "Send missionaries instead — and bring back a convert."
 rse_christslav.0005.c:0 "Leave the frontier in peace."

 rse_christslav.0006.t:0 "A Slavic Prince in Chains"
 rse_christslav.0006.desc:0 "[slavic_prince.GetTitledFirstName], a Slavic noble captured in a recent skirmish, kneels in your dungeon. His kin may pay. The slavers will pay more. The priests will pay nothing — but smile at conversion."
 rse_christslav.0006.a:0 "Ransom him to his people. (+150 gold)"
 rse_christslav.0006.b:0 "Sell him. A noble fetches a princely price. (+75 gold)"
 rse_christslav.0006.c:0 "Baptize him. A Slavic Christian is a powerful ally."

 rse_bondage.0023.t:0 "Married to a Stranger"
 rse_bondage.0023.desc:0 "[master.GetTitledFirstName] has decided to pair the household's slaves. [slave_husband.GetTitledFirstName] is to be your husband — a stranger, a fellow chattel, chosen for breeding stock. The ceremony is tomorrow."
 rse_bondage.0023.a:0 "Accept the marriage. Find what comfort there is."
 rse_bondage.0023.b:0 "Refuse — and accept the consequences."
 rse_bondage.0023.c:0 "Accept — but plan to make it work for me."

 rse_bondage.0024.t:0 "The Rival's Whisper"
 rse_bondage.0024.desc:0 "[rival_concubine.GetTitledFirstName], a fellow concubine of [master.GetTitledFirstName], has begun whispering against you. Each compliment to you costs her favour. She will not endure rivals."
 rse_bondage.0024.a:0 "Outshine her. The master's eye sees beauty."
 rse_bondage.0024.b:0 "Plant evidence — let her fall first."
 rse_bondage.0024.c:0 "Propose an alliance. Better together than apart."

 rse_bondage.0025.t:0 "A Gift to a Guest"
 rse_bondage.0025.desc:0 "[old_master.GetTitledFirstName] grasps [new_master.GetTitledFirstName] by the shoulder and points to you. A gift, a kindness, a courtesy between nobles. You are passed across the table like a flagon of wine."
 rse_bondage.0025.a:0 "Go silently. Survive the new house."
 rse_bondage.0025.b:0 "Charm the new master from the first day."
 rse_bondage.0025.c:0 "Plot — what you know of the old house has value."

 rse_bondage.0026.t:0 "A Voice in the Master's Ear"
 rse_bondage.0026.desc:0 "[master.GetTitledFirstName] has begun asking for your counsel — in matters of court, of trade, even of family. A slave who can think is rare. A slave who can think and is trusted is rarer still."
 rse_bondage.0026.a:0 "Counsel openly. Earn favour through wisdom."
 rse_bondage.0026.b:0 "Refuse to advise. I am no scheming Greek."
 rse_bondage.0026.c:0 "Counsel — and shape what the master hears."

 rse_bondage.0027.t:0 "Years of Service"
 rse_bondage.0027.desc:0 "Your hair grays, your back stoops, your hands tremble. [master.GetTitledFirstName] looks at you and sees what every master sees in an aging slave: a question that must be answered."
 rse_bondage.0027.a:0 "Beg for manumission. After all these years."
 rse_bondage.0027.b:0 "Offer to serve as housekeeper. Dignity in service."
 rse_bondage.0027.c:0 "Slip away. They will not look for an old woman."

 rse_bondage.0028.t:0 "A Babe at the Breast"
 rse_bondage.0028.desc:0 "[noble_child.GetTitledFirstName], the master's legitimate babe, is given to you to nurse. Their first words may be your name. Their first memory, your face. A trust — and a chain."
 rse_bondage.0028.a:0 "Nurse them devotedly. Love them as my own."
 rse_bondage.0028.b:0 "Do the work, no more. Do not become attached."
 rse_bondage.0028.c:0 "Shape them — words whispered to a child grow into men."

 rse_bondage.0029.t:0 "Caught in the Garden"
 rse_bondage.0029.desc:0 "The steward finds you with [lover.GetTitledFirstName] in the orchard, behind the apple trees. A slave is not allowed her own affections. The master will hear. The choice now is whose fault it shall be."
 rse_bondage.0029.a:0 "Blame him. He forced himself on me."
 rse_bondage.0029.b:0 "Defend our love. We shall die together if we must."
 rse_bondage.0029.c:0 "Smile, weep, and turn the tale on its head."

 rse_bondage.0030.t:0 "A Tutor for the Young Lady"
 rse_bondage.0030.desc:0 "[young_lady.GetTitledFirstName], the master's daughter, is sent to you for lessons in letters, languages, and the gentle arts. The master notes that you are educated. Few slaves are. Few slaves outlive that distinction."
 rse_bondage.0030.a:0 "Teach her well. A future patron, perhaps."
 rse_bondage.0030.b:0 "Drill her simply. Earn the keep, no more."
 rse_bondage.0030.c:0 "Refuse. I shall not raise another generation of masters."

 rse_bondage.0031.t:0 "A Stranger at the Gate"
 rse_bondage.0031.desc:0 "[relative.GetTitledFirstName], a kinsman from your old life, has come to the gate, asking after you. They have heard you live here. They have brought what coin they could. They ask permission to speak with [master.GetTitledFirstName]."
 rse_bondage.0031.a:0 "Let them ransom me. Pray it works."
 rse_bondage.0031.b:0 "Refuse the ransom. The coin is too dear for their purse."
 rse_bondage.0031.c:0 "Tell them to forget me. The dead do not return."

 rse_bondage.0032.t:0 "Spy at the Feast"
 rse_bondage.0032.desc:0 "[master.GetTitledFirstName] takes you aside: a foreign noble visits, and the master wants what passes from their lips into your ear. A slave is invisible. A slave hears everything. Or so [master.GetTitledFirstName] believes."
 rse_bondage.0032.a:0 "Report everything to the master."
 rse_bondage.0032.b:0 "Warn the visitor instead."
 rse_bondage.0032.c:0 "Tell the master what he wants to hear — but truly serve the visitor."

 rse_bondage.0033.t:0 "Accused of Poison"
 rse_bondage.0033.desc:0 "[master.GetTitledFirstName] has fallen ill — and the steward has decided you are to blame. The kitchen was yours that day; the herbs were close to hand. Whether or not you actually did it, the verdict will not consider the truth."
 rse_bondage.0033.a:0 "Plead my innocence. Trust to the master's mercy."
 rse_bondage.0033.b:0 "Pin the blame on another slave."
 rse_bondage.0033.c:0 "Finish what they say I began."

 rse_bondage.0034.t:0 "A Wedding Gift"
 rse_bondage.0034.desc:0 "[my_daughter.GetTitledFirstName], your daughter, is to be a wedding gift — a beautiful slave-bride for [master.GetTitledFirstName]'s ally. She is being prepared at this moment. There is little time."
 rse_bondage.0034.a:0 "Accept. Better a noble bed than a peasant's grave."
 rse_bondage.0034.b:0 "Slip her poison — better dead than chattel."
 rse_bondage.0034.c:0 "Begin a long, slow plan. She will be free one day."

 rse_bondage.0035.t:0 "A Slave's Burial"
 rse_bondage.0035.desc:0 "An old slave who served the household before you arrived has died in the night. The master will not pay for a burial. The body lies in the slave quarters, waiting."
 rse_bondage.0035.a:0 "Tend the body. Say the prayers."
 rse_bondage.0035.b:0 "Let the steward handle it. Slaves bury slaves."
 rse_bondage.0035.c:0 "Strip the body of its meagre coin and trinkets."

 rse_bondage.0036.t:0 "A Freedwoman Returns"
 rse_bondage.0036.desc:0 "[former_slave.GetTitledFirstName] arrives at the court as a visiting merchant's interpreter. She wears silks and gold. She bore your chains, once. Now she carries her own purse — and looks at you with the strangest of eyes."
 rse_bondage.0036.a:0 "Embrace her. Let her remember her sister."
 rse_bondage.0036.b:0 "Beg her to help me escape — for the love of what we were."
 rse_bondage.0036.c:0 "Refuse to know her. She is no longer one of us."

 rse_owner.0001.t:0 "A Slave Bears a Child"
 rse_owner.0001.desc:0 "[slave_mother.GetTitledFirstName], one of your slaves, has given birth. The infant lies at her breast — and the question of what to do with both falls to you."
 rse_owner.0001.a:0 "The child is a slave like the mother."
 rse_owner.0001.b:0 "Free mother and child. Such mercy honors the household."
 rse_owner.0001.c:0 "Expose the infant. Slaves do not need families."

 rse_owner.0002.t:0 "Two Slaves in Love"
 rse_owner.0002.desc:0 "The steward reports: [slave_lover_a.GetTitledFirstName] and [slave_lover_b.GetTitledFirstName] have been meeting in secret. They are in love — a thing that ought to be impossible among chattel. What is your will?"
 rse_owner.0002.a:0 "Allow them to marry. A breeding pair is useful."
 rse_owner.0002.b:0 "Sell him to a distant buyer. (+50 gold)"
 rse_owner.0002.c:0 "Hang them both. Slaves love their masters only."

 rse_owner.0003.t:0 "A Runaway"
 rse_owner.0003.desc:0 "[runaway_slave.GetTitledFirstName] was caught on the road, twelve miles out. The guards drag them back, bloodied and exhausted. The whole household awaits your verdict."
 rse_owner.0003.a:0 "Execute them. Make an example."
 rse_owner.0003.b:0 "Brand and flog. Send them back to the fields."
 rse_owner.0003.c:0 "Free them. Some spirits cannot be broken."

 rse_owner.0004.t:0 "A Slave Saves Your Life"
 rse_owner.0004.desc:0 "[loyal_slave.GetTitledFirstName], your slave, threw themselves between you and an assassin's blade. They survived. Your debt is plain."
 rse_owner.0004.a:0 "Free them. A life for a life."
 rse_owner.0004.b:0 "Reward them generously, but keep them in service. (-25 gold)"
 rse_owner.0004.c:0 "They did their duty. No more is owed."

 rse_owner.0005.t:0 "A Cleric Disapproves"
 rse_owner.0005.desc:0 "[visiting_cleric.GetTitledFirstName] has spoken from the pulpit against the slaves in your household. Some of them, he reminds you, share your faith. The congregation murmurs in agreement."
 rse_owner.0005.a:0 "Free them all. The pulpit speaks for God."
 rse_owner.0005.b:0 "Free a few — a token of goodwill."
 rse_owner.0005.c:0 "Tell the cleric to mind his sermons, not my house."

 rse_owner.0006.t:0 "A Guest Covets Your Slave"
 rse_owner.0006.desc:0 "[covetous_guest.GetTitledFirstName], dining at your table, cannot take their eyes off [coveted_slave.GetTitledFirstName]. They make an offer — a generous one. The slave waits, silent."
 rse_owner.0006.a:0 "Sell. The gold is real. (+200 gold)"
 rse_owner.0006.b:0 "Give as a gift. The friendship is worth more."
 rse_owner.0006.c:0 "Refuse. They are mine."

 rse_owner.0007.t:0 "The Household Reckoning"
 rse_owner.0007.desc:0 "[steward.GetTitledFirstName] presents the books: the slaves of the household eat much, work less, breed faster than they earn. He recommends a thinning of the ranks."
 rse_owner.0007.a:0 "Sell two slaves at the market. (+150 gold)"
 rse_owner.0007.b:0 "Improve their conditions. Well-fed slaves work harder. (-50 gold)"
 rse_owner.0007.c:0 "Promote a clever one. Inspire the rest."

 rse_owner.0008.t:0 "The Slave Who Teaches"
 rse_owner.0008.desc:0 "[teacher_slave.GetTitledFirstName] has been teaching [bright_child.GetTitledFirstName] — letters, Latin, the arts. The child grows clever. The steward observes that a tutor of such quality could fetch a fine price elsewhere."
 rse_owner.0008.a:0 "Free them. A free tutor will give better lessons."
 rse_owner.0008.b:0 "Promote to house-slave. They stay where they are useful. (-25 gold)"
 rse_owner.0008.c:0 "Sell them. Coin in hand is better than promises. (+150 gold)"

 rse_owner.0009.t:0 "A Thief in the Household"
 rse_owner.0009.desc:0 "[thief_slave.GetTitledFirstName] was caught with the steward's purse in their hand. Twelve silver, a bone-comb, a small enamelled cross. A petty theft. A serious matter."
 rse_owner.0009.a:0 "Flog them. The mark will remind them."
 rse_owner.0009.b:0 "Hang them. Theft is not to be tolerated."
 rse_owner.0009.c:0 "Forgive. Hunger turns the cleanest hand."

 rse_owner.0010.t:0 "Plague in the Quarters"
 rse_owner.0010.desc:0 "Fever has taken root in the slave quarters. Three are already coughing blood. The household physician demands a decision: pay for medicine, isolate the sick, or — as some lords do — burn the lot."
 rse_owner.0010.a:0 "Pay for the physician. They are valuable. (-75 gold)"
 rse_owner.0010.b:0 "Let it run its course. The strong shall survive."
 rse_owner.0010.c:0 "Cast them out. Let them die elsewhere."

 rse_owner.0011.t:0 "A Slave of Noble Blood"
 rse_owner.0011.desc:0 "The steward whispers a curious discovery: [hidden_noble.GetTitledFirstName], one of your slaves, bears a noble birthmark and speaks in a courtly accent when they sleep. They are perhaps no slave at all by birth — and might be worth far more than the lash of an overseer."
 rse_owner.0011.a:0 "Free them. Make an ally of a prince."
 rse_owner.0011.b:0 "Ransom them quietly back to their kin. (+200 gold)"
 rse_owner.0011.c:0 "Silence them. Some secrets are dangerous."

 rse_owner.0012.t:0 "Conversion of a Slave"
 rse_owner.0012.desc:0 "[converting_slave.GetTitledFirstName] kneels before the chapel door and begs for baptism — to embrace your faith, to be of one heart with the household. The chaplain looks at you, awaiting your nod."
 rse_owner.0012.a:0 "Baptize and free. A new sibling in faith deserves no chains."
 rse_owner.0012.b:0 "Baptize, but keep in service."
 rse_owner.0012.c:0 "Refuse. Their faith is between them and oblivion."

 rse_owner.0013.t:0 "Kin at the Gate"
 rse_owner.0013.desc:0 "[ransoming_kin.GetTitledFirstName] has come, leading a mule laden with coin, to ransom [ransomed_slave.GetTitledFirstName]. They have come a long way. The purse is plump."
 rse_owner.0013.a:0 "Accept the fair price. (+150 gold)"
 rse_owner.0013.b:0 "Double the price. They have come far. (+300 gold)"
 rse_owner.0013.c:0 "Refuse. The slave is not for sale."

 rse_owner.0014.t:0 "A Hidden Talent"
 rse_owner.0014.desc:0 "[artist_slave.GetTitledFirstName] has been found at night, drawing in charcoal on the kitchen wall. The drawings are exquisite. A talent like this could grace the court — or fetch a foreign prince's price."
 rse_owner.0014.a:0 "Sponsor them. Buy paints and a teacher. (-50 gold)"
 rse_owner.0014.b:0 "Sell them to a foreign court. (+200 gold)"
 rse_owner.0014.c:0 "Keep them at it. Beauty in the household pleases me."

 rse_owner.0015.t:0 "A Plot Uncovered"
 rse_owner.0015.desc:0 "Your spymaster brings word: [plotting_slave.GetTitledFirstName] has been overheard plotting against your life — coin promised, accomplices named. The slave is in custody. The verdict is yours."
 rse_owner.0015.a:0 "Execute. Make the example public."
 rse_owner.0015.b:0 "Geld them and break them at the labour."
 rse_owner.0015.c:0 "Turn them — a willing plotter is a useful tool."

 rse_orthsunni.0001.t:0 "The Patriarch Speaks"
 rse_orthsunni.0001.desc:0 "From the great church the Patriarch's letter has come — a denunciation of [sunni_neighbor.GetTitledFirstName], the Sunni emir across the strait, whose ulema preach the destruction of the icons and the falling of the cross. The faithful look to you."
 rse_orthsunni.0001.a:0 "Answer the Patriarch. The cross stands against the crescent."
 rse_orthsunni.0001.b:0 "Honour the neighbour. Faith is not the only matter between princes."
 rse_orthsunni.0001.c:0 "Send the emir a quiet gift. Peace has its price. (-75 gold)"

 rse_orthsunni.0002.t:0 "Refugees at the Gate"
 rse_orthsunni.0002.desc:0 "Hundreds of refugees of our faith stream across the frontier into [refuge_county.GetName], fleeing persecution at the hands of the rival faith. [refugee_leader.GetTitledFirstName] kneels before you and asks for shelter, bread, and protection."
 rse_orthsunni.0002.a:0 "Settle them in the county. Their hands are willing."
 rse_orthsunni.0002.b:0 "House them in camps. We shall see how things go. (-50 gold)"
 rse_orthsunni.0002.c:0 "Drive them back. We have troubles of our own."

 rse_orthsunni.0003.t:0 "A Tribute Demanded"
 rse_orthsunni.0003.desc:0 "An envoy of [tribute_demander.GetTitledFirstName] stands at your court, demanding tribute — annual, in gold and grain — for peace on the frontier. The threat is plain. The shame, also."
 rse_orthsunni.0003.a:0 "Pay. (-150 gold)"
 rse_orthsunni.0003.b:0 "Refuse — and prepare for war."
 rse_orthsunni.0003.c:0 "Delay, dissemble, send the envoy back with vague answers."

 rse_orthsunni.0004.t:0 "A Holy Place Defiled"
 rse_orthsunni.0004.desc:0 "Word arrives that a great church (or mosque) across the rival frontier has been defiled — icons smashed, prayers banned, blood spilled on the altar. The faithful demand a response."
 rse_orthsunni.0004.a:0 "Preach a holy war. Let every man arm himself."
 rse_orthsunni.0004.b:0 "Send gold to rebuild what the rival destroyed. (-100 gold)"
 rse_orthsunni.0004.c:0 "Stones and statues — let them quarrel over."

 rse_orthsunni.0005.t:0 "A Cleric in Chains"
 rse_orthsunni.0005.desc:0 "[captured_cleric.GetTitledFirstName], a learned cleric of the rival faith, was taken in the last campaign. He sits in your dungeon, neither pleading nor defiant. The chaplain demands an answer."
 rse_orthsunni.0005.a:0 "The block. He preached against us; let him preach no more."
 rse_orthsunni.0005.b:0 "Convert him. A learned mind for our faith is no small thing."
 rse_orthsunni.0005.c:0 "Ransom him. Coin is coin. (+100 gold)"

 rse_orthsunni.0006.t:0 "A Match Across the Faith"
 rse_orthsunni.0006.desc:0 "An offer of marriage arrives — [cross_faith_match.GetTitledFirstName], of the rival faith, is proposed for [own_child.GetTitledFirstName]. The alliance would be powerful, but the priests would howl."
 rse_orthsunni.0006.a:0 "Accept. Politics outweighs prayer."
 rse_orthsunni.0006.b:0 "Demand conversion first. Then the wedding."
 rse_orthsunni.0006.c:0 "Refuse. My blood shall not mix with the infidel."

 rse_orthsunni.0007.t:0 "The Devshirme"
 rse_orthsunni.0007.desc:0 "The grand vizier proposes a levy of Christian boys from the Orthodox lands — to be raised as Muslims, drilled as soldiers, devoted entirely to the Sultan. The mothers shall weep. The army shall be invincible."
 rse_orthsunni.0007.a:0 "Begin the levy. Iron loyalty is bought in cradles."
 rse_orthsunni.0007.b:0 "A smaller levy — drawn from volunteers. (-50 gold)"
 rse_orthsunni.0007.c:0 "Refuse. Some prices are too high."

 rse_war_faithful_host:0 "Faithful Host"
 rse_realm_garrison_army:0 "Realm Garrison"
 rse_reconquest_garrison:0 "Frontier Garrison"
 rse_coastal_garrison:0 "Coastal Guard"
 rse_crusader_response:0 "Crusader Response"
 rse_slave_revolt_response:0 "Slave Revolt Response"

 rse_bondage.0037.t:0 "The Mistress is Ill"
 rse_bondage.0037.desc:0 "[mistress.GetTitledFirstName], the lady of the house, lies sweating with fever. The household priests have done what they can; now she calls for the soft hands of a slave. You are sent."
 rse_bondage.0037.a:0 "Nurse her faithfully through the long nights."
 rse_bondage.0037.b:0 "A little something in the medicine, perhaps..."
 rse_bondage.0037.c:0 "Do my duty. Nothing more."

 rse_bondage.0038.t:0 "A Lady's Patronage"
 rse_bondage.0038.desc:0 "[patroness.GetTitledFirstName], a learned lady of the court, has taken notice of you. She offers to teach you what she knows — letters, languages, the arts. The chaplain disapproves. The master shrugs."
 rse_bondage.0038.a:0 "Accept gratefully. Knowledge is a kind of freedom."
 rse_bondage.0038.b:0 "Refuse. Education breeds dangerous thoughts."
 rse_bondage.0038.c:0 "Accept — and learn what to do with what I learn."

 rse_bondage.0039.t:0 "A Forbidden Book"
 rse_bondage.0039.desc:0 "Hidden behind the cushion in the master's study, a small book — written in a language you half-remember, perhaps from your childhood. Its pages speak of things the chaplain has condemned."
 rse_bondage.0039.a:0 "Read it in secret. The mind is the last free place."
 rse_bondage.0039.b:0 "Show it to the master. Loyalty above curiosity."
 rse_bondage.0039.c:0 "Leave it where it lay. Some doors are best unopened."

 rse_bondage.0040.t:0 "Your Daughter, Grown"
 rse_bondage.0040.desc:0 "[grown_daughter.GetTitledFirstName], the daughter you bore in chains, has come of age. The master notes she is comely. Soon she will be put to use — as you were."
 rse_bondage.0040.a:0 "Embrace her. Whatever comes, we shall face it together."
 rse_bondage.0040.b:0 "Beg the master to free her. Use my last coin if needed. (-50 gold)"
 rse_bondage.0040.c:0 "Weep alone. There is nothing I can do."

 rse_bondage.0041.t:0 "The Master's Brother"
 rse_bondage.0041.desc:0 "[masters_brother.GetTitledFirstName], the master's younger brother, has come to visit. By the end of the first night he has been in the slave quarters, asking after you. By the second night he has not asked at all."
 rse_bondage.0041.a:0 "Yield in silence. Two masters, perhaps, are better than one."
 rse_bondage.0041.b:0 "Tell the master. Let one brother punish the other."
 rse_bondage.0041.c:0 "Play one against the other. Carefully."

 rse_bondage.0042.t:0 "At the Market"
 rse_bondage.0042.desc:0 "The master takes you to the slave market on an errand. In the line of new captives, you see a face you knew — [old_companion.GetTitledFirstName], from before the chains. They have been beside you in chains long ago, and now stand again before the auctioneer."
 rse_bondage.0042.a:0 "Beg the master to buy her. (-50 gold)"
 rse_bondage.0042.b:0 "Look away. I cannot bear it."
 rse_bondage.0042.c:0 "Pray silently for her, and walk on."

 rse_bondage.0043.t:0 "A Poet's Song"
 rse_bondage.0043.desc:0 "[poet.GetTitledFirstName], a wandering poet, has written verses about you — your beauty, your sorrow, your dignity in chains. The song is being sung in the courts of three lands. The master is unsure whether to be flattered or alarmed."
 rse_bondage.0043.a:0 "Let the song spread. Fame is a small freedom."
 rse_bondage.0043.b:0 "Beg the master to silence the poet."
 rse_bondage.0043.c:0 "Send word to the poet. There is more he could say, with help."

 rse_bondage.0044.t:0 "A Brutal Punishment"
 rse_bondage.0044.desc:0 "The steward is flogging [victim_slave.GetTitledFirstName] in the courtyard — for some small infraction, real or imagined. The blood pools on the cobbles. The household watches in silence."
 rse_bondage.0044.a:0 "Step forward and beg for mercy."
 rse_bondage.0044.b:0 "Watch in silence. There is nothing I can do."
 rse_bondage.0044.c:0 "Smile at the master. Loyalty is shown thus."

 rse_bondage.0045.t:0 "Reading to the Master"
 rse_bondage.0045.desc:0 "[master.GetTitledFirstName]'s eyes have grown weak. He needs someone literate to read to him — letters, ledgers, sometimes secrets. The chaplain says only a man should hear such things. The master shrugs."
 rse_bondage.0045.a:0 "Accept gladly. Knowledge is power."
 rse_bondage.0045.b:0 "Accept — and remember everything I hear."
 rse_bondage.0045.c:0 "Refuse. I am not a clerk."

 rse_bondage.0046.t:0 "A Vision in the Night"
 rse_bondage.0046.desc:0 "Tonight you dreamt of a figure in light — a saint, a god, a messenger you cannot name — who spoke of freedom, of justice, of a chain that breaks under its own weight. You wake weeping."
 rse_bondage.0046.a:0 "Pray and tell no one. The vision is mine."
 rse_bondage.0046.b:0 "Tell the master. Such things bring favour."
 rse_bondage.0046.c:0 "Doubt the vision. It was only a dream."

 rse_bondage.0047.t:0 "A Lost Kinsman"
 rse_bondage.0047.desc:0 "[lost_kin.GetTitledFirstName], a kinsman you thought long dead, has come to the gate. They look upon you with shocked recognition. They have coin. They have time. The master has the keys."
 rse_bondage.0047.a:0 "Beg them to negotiate my ransom."
 rse_bondage.0047.b:0 "Take what news of home they bring, no more."
 rse_bondage.0047.c:0 "Send them away. The dead should stay dead."

 rse_bondage.0048.t:0 "A Foreign Court"
 rse_bondage.0048.desc:0 "The master takes you on a long journey to a foreign court. [foreign_lord.GetTitledFirstName] receives you all with feasts. In the strange palace, watched by strange guards, you find yourself further from home than ever — or perhaps closer to escape."
 rse_bondage.0048.a:0 "Slip into the night and beg the foreign lord for asylum."
 rse_bondage.0048.b:0 "Watch the customs. Learn what may be useful."
 rse_bondage.0048.c:0 "Serve the master well. Do not draw attention."

 rse_bondage.0049.t:0 "The Old Gods"
 rse_bondage.0049.desc:0 "The cook caught you at dawn, lighting a candle and whispering a prayer in the old tongue. [master.GetTitledFirstName] has been told. The chaplain demands a hearing."
 rse_bondage.0049.a:0 "Recant. Convert to the master's faith. Whatever it takes."
 rse_bondage.0049.b:0 "Refuse. The old gods of my mothers shall not be denied."
 rse_bondage.0049.c:0 "Bribe the cook to take it back."

 rse_bondage.0050.t:0 "A Grateful Ward"
 rse_bondage.0050.desc:0 "[grateful_ward.GetTitledFirstName], the master's child you once cared for as a babe, has come of age and returned. They remember your face. They remember your kindness. They have not forgotten the chains around your wrists."
 rse_bondage.0050.a:0 "Beg them to use their inheritance to free me."
 rse_bondage.0050.b:0 "Ask only for small mercies — better food, lighter work."
 rse_bondage.0050.c:0 "Ask nothing. I am at peace."

 rse_bondage.0051.t:0 "The Merchant's Wife"
 rse_bondage.0051.desc:0 "[merchant_wife.GetTitledFirstName], wife of a trader who supplies the household, has noticed your sharp eye for figures. She offers to teach you the secrets of ledgers and coin — quietly, when the master is away."
 rse_bondage.0051.a:0 "Learn eagerly. Numbers are a kind of power."
 rse_bondage.0051.b:0 "Decline politely. I want no debt to anyone."
 rse_bondage.0051.c:0 "Tell the master of her offer. Loyalty first."

 rse_bondage.0052.t:0 "The Harem's Whispers"
 rse_bondage.0052.desc:0 "[head_wife.GetTitledFirstName], the chief wife, rules the women's quarters like a queen. The concubines whisper of her cruelties, her favourites, her enemies. You must decide where you stand in this web."
 rse_bondage.0052.a:0 "Undermine her. The web has two spiders now."
 rse_bondage.0052.b:0 "Befriend her. Better an ally than a rival."
 rse_bondage.0052.c:0 "Stay close to the master. His favour outranks hers."

 rse_bondage.0053.t:0 "Famine in the House"
 rse_bondage.0053.desc:0 "A hard winter has emptied the granaries. The free folk go hungry; the slaves are given nothing but scraps. Some of the household will not see spring."
 rse_bondage.0053.a:0 "Give my portion to the weaker ones."
 rse_bondage.0053.b:0 "Steal from the master's stores. Survival first."
 rse_bondage.0053.c:0 "Endure. I have known hunger before."

 rse_bondage.0054.t:0 "A Bargain for Freedom"
 rse_bondage.0054.desc:0 "[master.GetTitledFirstName] comes to you with an offer wrapped in honeyed words: serve willingly, please him fully, and in time — perhaps — freedom. The promise is sweet. The price is yourself."
 rse_bondage.0054.a:0 "Accept the bargain. Hope is worth the price."
 rse_bondage.0054.b:0 "Refuse. A promise from a master is worth nothing."
 rse_bondage.0054.c:0 "Pretend to accept — and plan another way out."

 rse_bondage.0055.t:0 "An Old Freedman's Counsel"
 rse_bondage.0055.desc:0 "[old_freedman.GetTitledFirstName], once a slave like you and now free, lingers by the well. He has survived what you endure, and earned his freedom. He offers a few quiet words of advice."
 rse_bondage.0055.a:0 "Heed his patience. Endurance is the slow road home."
 rse_bondage.0055.b:0 "Learn his cunning. He did not buy freedom with patience alone."
 rse_bondage.0055.c:0 "Take his faith. He kept his soul through it all."

 rse_bondage.0056.t:0 "Lost at Dice"
 rse_bondage.0056.desc:0 "[master.GetTitledFirstName] has gambled badly, and to settle the debt, [creditor.GetTitledFirstName] demands payment in flesh — you. A pawn passed between gaming tables."
 rse_bondage.0056.a:0 "Go to the new master. One owner is much like another."
 rse_bondage.0056.b:0 "See opportunity in the change. A new house, new cracks to slip through."
 rse_bondage.0056.c:0 "Plead to stay. Better the devil I know."

 rse_bondage.0057.t:0 "Freedom in the Will"
 rse_bondage.0057.desc:0 "The notary reads the late master's testament, and your name is among the bequests — not as property to be passed on, but to be set free. After all these years, the chains fall away."
 rse_bondage.0057.a:0 "Walk out the gate. The world is wide, and mine."
 rse_bondage.0057.b:0 "Stay on as a free servant. This is the only home I know."
