l_english:
 trait_rse_slaver_apprentice:0 "Slaver's Apprentice"
 trait_rse_slaver_apprentice_desc:0 "Has learned the basics of the slave trade — the markets, the brokers, the routes."
 trait_rse_slave_broker:0 "Slave Broker"
 trait_rse_slave_broker_desc:0 "Skilled in moving human cargo across the realm. Coin flows where chains clatter."
 trait_rse_taskmaster:0 "Taskmaster"
 trait_rse_taskmaster_desc:0 "Hardened by years of breaking will. Slaves obey, others fear."
 trait_rse_manumitter:0 "Manumitter"
 trait_rse_manumitter_desc:0 "Has freed many from bondage. The faithful praise this mercy."
 trait_rse_mamluk_lord:0 "Mamluk Lord"
 trait_rse_mamluk_lord_desc:0 "Master of a corps of military slaves — soldiers of iron loyalty."
 trait_rse_harem_keeper:0 "Harem Keeper"
 trait_rse_harem_keeper_desc:0 "Maintains a great household of concubines. Pleasure and influence intertwine."
 trait_rse_chainbreaker:0 "Chainbreaker"
 trait_rse_chainbreaker_desc:0 "Has shattered the chains of bondage across the realm. A saint to many."
 trait_rse_grand_slaver:0 "Grand Slaver"
 trait_rse_grand_slaver_desc:0 "Wealth flows like a river through your hands — bought with the labour of countless souls."

 rse_slavery_path_begin_decision:0 "Enter the Slave Trade"
 rse_slavery_path_begin_decision_desc:0 "Establish connections with slave brokers and learn the rudiments of the trade. This is the first step on a long road."
 rse_slavery_path_begin_decision_tooltip:0 "Gain the Slaver's Apprentice trait."

 rse_slavery_path_broker_decision:0 "Become a Slave Broker"
 rse_slavery_path_broker_decision_desc:0 "Move beyond the apprenticeship — establish your own slave-trading network across the realm."
 rse_slavery_path_broker_decision_tooltip:0 "Replace Slaver's Apprentice with Slave Broker."

 rse_slavery_path_taskmaster_decision:0 "Become the Taskmaster"
 rse_slavery_path_taskmaster_decision_desc:0 "Establish a reputation for breaking slaves — and breaking enemies who hear of you."

 rse_slavery_path_mamluk_decision:0 "Found a Mamluk Corps"
 rse_slavery_path_mamluk_decision_desc:0 "Establish a permanent corps of military slaves, raised from boyhood as warriors of the faith."

 rse_slavery_path_harem_decision:0 "Establish a Grand Harem"
 rse_slavery_path_harem_decision_desc:0 "Maintain a great household of concubines, in the style of the greatest sultans."

 rse_slavery_path_grand_decision:0 "Become the Grand Slaver"
 rse_slavery_path_grand_decision_desc:0 "Crown your career in the slave trade — establish regulated markets across every county of your realm."

 rse_slavery_path_manumitter_decision:0 "Take the Path of Mercy"
 rse_slavery_path_manumitter_decision_desc:0 "Abandon the trade. Free those you held, and lead by mercy instead of chains."

 rse_slavery_path_chainbreaker_decision:0 "Become the Chainbreaker"
 rse_slavery_path_chainbreaker_decision_desc:0 "End slavery throughout your domain. Settle the freed as honest tenants of the realm."

 rse_find_lowborn_beauty_decision:0 "Find a Low-Born Beauty"
 rse_find_lowborn_beauty_decision_desc:0 "Send out word that a comely commoner is sought for the court. Beauty knows no birthright."
 rse_organize_slave_market_decision:0 "Open a Slave Market"
 rse_organize_slave_market_decision_desc:0 "Open a slave market in one of your counties. The coin will flow — but so will the chains."

 trait_rse_enslaved:0 "Enslaved"
 trait_rse_enslaved_desc:0 "Bound by chains to another. Their will is not their own."
 trait_rse_freed_slave:0 "Freed Slave"
 trait_rse_freed_slave_desc:0 "Once chained, now free. Bears the marks of bondage still."
 trait_rse_concubine_slave:0 "Concubine"
 trait_rse_concubine_slave_desc:0 "Bound to share the bed of a master. Comely, devoted, and dependent."
 trait_rse_eunuch:0 "Eunuch"
 trait_rse_eunuch_desc:0 "Cut by the knife in youth. Trusted in the harem, sharp in the council."
 trait_rse_house_slave:0 "House Slave"
 trait_rse_house_slave_desc:0 "A trusted servant raised in bondage. Loyal to the household above all."

 rse_enslave_prisoner_interaction:0 "Enslave Prisoner"
 rse_enslave_prisoner_interaction_desc:0 "Place [recipient.GetTitledFirstName] in bondage. They will lose their titles and serve in your household as a slave."

 rse_raid_for_slaves_interaction:0 "Raid for Slaves"
 rse_raid_for_slaves_interaction_desc:0 "Send raiders into [recipient.GetTitledFirstName]'s lands to seize captives. Once in three years, while at war as the war leader."

 rse_free_house_slave_interaction:0 "Free This Slave"
 rse_free_house_slave_interaction_desc:0 "Strike the chains from [recipient.GetTitledFirstName]. They shall be a freed servant, not chattel."

 rse_designate_concubine_interaction:0 "Take as Concubine"
 rse_designate_concubine_interaction_desc:0 "Add [recipient.GetTitledFirstName] to your concubines. Their consent is not required."

 rse_make_eunuch_interaction:0 "Make a Eunuch"
 rse_make_eunuch_interaction_desc:0 "Have [recipient.GetTitledFirstName] gelded. They will be trusted in the harem and skilled in court intrigue."

 rse_slave.0009.t:0 "Slavers in Our Lands"
 rse_slave.0009.desc:0 "Word arrives from the frontier: enemy raiders have struck our villages, dragging away peasants and craftsmen in chains. The county is gutted; the wails carry for miles."
 rse_slave.0009.a:0 "They shall pay tenfold."
 rse_slave.0009.b:0 "Such is war. Pray for the captives."

 rse_slave.0010.t:0 "A Low-Born Beauty"
 rse_slave.0010.desc:0 "[lowborn_beauty.GetTitledFirstName], a commoner of remarkable beauty, has been brought before you. She kneels in homespun, but her face would shame a queen. The court murmurs."
 rse_slave.0010.a:0 "Take her as concubine."
 rse_slave.0010.b:0 "Welcome her as a free guest of the court."
 rse_slave.0010.c:0 "Put her in chains. A beauty in bondage. (-25 gold)"
 rse_slave.0010.d:0 "Send her home. The court is no place for peasants. (+25 gold)"

 rse_slavery_path_begin_decision_confirm:0 "Begin the Path"
 rse_slavery_path_broker_decision_confirm:0 "Become a Broker"
 rse_slavery_path_taskmaster_decision_confirm:0 "Take the Whip"
 rse_slavery_path_mamluk_decision_confirm:0 "Found the Corps"
 rse_slavery_path_harem_decision_confirm:0 "Build the Harem"
 rse_slavery_path_grand_decision_confirm:0 "Crown the Trade"
 rse_slavery_path_manumitter_decision_confirm:0 "Walk the Path of Mercy"
 rse_slavery_path_chainbreaker_decision_confirm:0 "Break the Chains"
