l_russian:
 rse_war.0001.t:0 "Священное рвение перед битвой"
 rse_war.0001.desc:0 "Накануне сражения [court_priest.GetTitledFirstName] собирает войско. Верующие молятся, знамёна освящаются, а еретический враг предаётся проклятию. Настроение лихорадочное — войско ждёт вашего слова."
 rse_war.0001.a:0 "$HIGHLIGHT$Пусть священник говорит — это священная война!$END$"
 rse_war.0001.b:0 "Напомните им: мы сражаемся за землю, а не за небеса."
 rse_war.0001.c:0 "У меня есть сомнения в этом 'святом' деле..."

 rse_war.0002.t:0 "Неверный в цепях"
 rse_war.0002.desc:0 "[captured_enemy.GetTitledFirstName], пленник чужой веры, доставлен пред ваши очи. Придворный капеллан требует его обращения. Капитаны требуют его головы. Милость или рвение?"
 rse_war.0002.a:0 "Обратить его — пусть увидит истинную веру."
 rse_war.0002.b:0 "Показательная казнь. Плаха ждёт."
 rse_war.0002.c:0 "Освободите его. Мы не чудовища."

 rse_war.0003.t:0 "Верующие сплачиваются"
 rse_war.0003.desc:0 "Весть о вашей священной борьбе разнеслась повсюду. Крестьяне, монахи и послушники со всей земли стекаются в вашу столицу, готовые поднять оружие за веру."
 rse_war.0003.a:0 "Вооружить их и выступать."
 rse_war.0003.b:0 "Благословить и отпустить — пусть духовенство помнит о нашем благочестии."

 rse_realm.0001.t:0 "Несогласный вассал"
 rse_realm.0001.desc:0 "[dissident_vassal.GetTitledFirstName] иной веры явился ко двору со списком обид. Тон сдержан, но в глазах горит обида. Держава следит за вашим ответом."
 rse_realm.0001.a:0 "Выслушать. Терпимость — мудрость."
 rse_realm.0001.b:0 "Напомнить, чья это держава."
 rse_realm.0001.c:0 "Кошель золота утихомирит обиды. (-50 золота)"

 rse_realm.0002.t:0 "Религиозная фракция"
 rse_realm.0002.desc:0 "Шпионы доносят: вассалы чужой веры во главе с [faction_leader.GetTitledFirstName] тайно собираются. Они говорят об обидах, о правах, а быть может... и о большем."
 rse_realm.0002.a:0 "Умиротворить уступками."
 rse_realm.0002.b:0 "Ударить первым — заточить вожака!"
 rse_realm.0002.c:0 "Наблюдать и выжидать. Знание — сила."

 rse_realm.0003.t:0 "План обращения"
 rse_realm.0003.desc:0 "[court_chaplain.GetTitledFirstName] предлагает великую миссию, оплаченную из вашей казны, дабы привести заблудшие графства в лоно истинной веры."
 rse_realm.0003.a:0 "Профинансировать миссию. (-100 золота)"
 rse_realm.0003.b:0 "У державы есть нужды поважнее."

 rse_realm.0004.t:0 "Обличить еретиков"
 rse_realm.0004.desc:0 "К вам приходят донесения о графствах, открыто исповедующих еретическую веру. Кафедры требуют публичного обличения."
 rse_realm.0004.a:0 "Обличить их со всех амвонов!"
 rse_realm.0004.b:0 "Мудрый правитель выбирает свои битвы."

 rse_domain.0001.t:0 "Ересь в домене"
 rse_domain.0001.desc:0 "В [troubled_county.GetName] звучат странные проповеди. По ночам крестьяне собираются в амбарах, шепчась о новых учениях. Ересь поднимает голову на ваших землях."
 rse_domain.0001.a:0 "Начать инквизицию. (-75 золота)"
 rse_domain.0001.b:0 "Пусть говорят. Идеи нельзя заковать в цепи."
 rse_domain.0001.c:0 "Не обращать внимания. Есть заботы поважнее."

 rse_domain.0002.t:0 "Отказ платить десятину"
 rse_domain.0002.desc:0 "Крестьяне [rebellious_county.GetName], не разделяющие вашей веры, отказались платить десятину. Они называют ваших сборщиков неверными, а ваших священников — лжецами."
 rse_domain.0002.a:0 "Послать солдат. Подать будет собрана — с лихвой."
 rse_domain.0002.b:0 "Снизить подать ради мира. (-25 золота)"
 rse_domain.0002.c:0 "Принудить их к истинной вере!"

 rse_domain.0003.t:0 "Видение святилища"
 rse_domain.0003.desc:0 "Вам снится яркий сон: великий храм, восстающий из земли [blessed_county.GetName]. Благочестивые говорят, что это призвание. Казначей не согласен."
 rse_domain.0003.a:0 "Возвести храм. Боги не примут меньшего. (-150 золота, -100 благочестия)"
 rse_domain.0003.b:0 "Это был лишь сон."

 rse_domain.0004.t:0 "Назревающий бунт"
 rse_domain.0004.desc:0 "[revolt_county.GetName] кипит. Крестьяне иной веры открыто говорят о свержении вашей власти. Действовать нужно до того, как чаша переполнится."
 rse_domain.0004.a:0 "Ввести гарнизон в графство. (-50 золота)"
 rse_domain.0004.b:0 "Уступки, дабы их успокоить."
 rse_domain.0004.c:0 "Указом обратить их — и покончить с этим!"

 rse_domain.0005.t:0 "Придворный иной веры"
 rse_domain.0005.desc:0 "[foreign_courtier.GetTitledFirstName] давно служит при вашем дворе — но не разделяет вашей веры. Капеллан желает его удаления; решение за вами."
 rse_domain.0005.a:0 "Склонить к обращению."
 rse_domain.0005.b:0 "Изгнать со двора."
 rse_domain.0005.c:0 "Он служил хорошо. Пусть остаётся."

 rse_reconquest.0001.t:0 "Христианское графство под полумесяцем"
 rse_reconquest.0001.desc:0 "[conquered_county.GetName] ныне ваше — взято мечом. Его жители преклоняются перед крестом, а не перед киблой. [christian_elder.GetTitledFirstName] молит о пощаде за свою паству. Улемы ждут вашего указа."
 rse_reconquest.0001.a:0 "Они будут зимми — защищёнными Людьми Книги."
 rse_reconquest.0001.b:0 "Пусть платят джизью и живут как хотят."
 rse_reconquest.0001.c:0 "Все должны принять истинную веру — обратить их!"

 rse_reconquest.0002.t:0 "Крест против полумесяца"
 rse_reconquest.0002.desc:0 "[rebel_county.GetName] кипит. Христианские крестьяне собираются в холмах, пряча кресты под одеждой и точа косы. Восстание близко."
 rse_reconquest.0002.a:0 "Раздавить их гарнизоном. (-75 золота)"
 rse_reconquest.0002.b:0 "Отменить джизью — хлеб важнее крови. (-50 золота)"
 rse_reconquest.0002.c:0 "Очистить христианский квартал. Показательно."

 rse_reconquest.0003.t:0 "Мольба епископа"
 rse_reconquest.0003.desc:0 "[bishop.GetTitledFirstName], епископ из [christian_county.GetName], просил аудиенции. Он преклоняет колени в вашем дворе, моля сохранить церкви и оставить клир в покое."
 rse_reconquest.0003.a:0 "Удовлетворить просьбу. Мудрый султан правит многими верами."
 rse_reconquest.0003.b:0 "Церкви сохранят свои стены — и заплатят немалый налог."
 rse_reconquest.0003.c:0 "В цепи его. Пусть христиане знают своё место."

 rse_reconquest.0004.t:0 "Реконкиста поднимает голову"
 rse_reconquest.0004.desc:0 "Шпионы сообщают, что [christian_neighbor.GetTitledFirstName] проповедует крестовый поход — отвоевание земель, которыми вы правите вместе с христианскими подданными. На границе неспокойно."
 rse_reconquest.0004.a:0 "Укрепить рубежи. (-100 золота)"
 rse_reconquest.0004.b:0 "Завоевать сердца христианских подданных, пока они не предали нас."
 rse_reconquest.0004.c:0 "Подавить — заглушить любой голос христиан в нашей земле."

 rse_reconquest.0005.t:0 "Тайный крест"
 rse_reconquest.0005.desc:0 "[secret_christian.GetTitledFirstName], годами служивший при дворе как правоверный мусульманин, был застигнут за молитвой перед распятием в своей келье. Криптохристианин, скрытый на виду."
 rse_reconquest.0005.a:0 "Вероотступник. Клинок решит."
 rse_reconquest.0005.b:0 "Принудить к покаянию и истинной вере."
 rse_reconquest.0005.c:0 "Сохранить тайну. Верный слуга — редкость."

 rse_reconquest.0006.t:0 "Вопрос мосарабов"
 rse_reconquest.0006.desc:0 "В [mozarab_county.GetName] происходит странное: христиане говорят на нашем языке, носят нашу одежду, поют наши песни — и всё же крестятся на рассвете. Они ни мы, ни они. Что с ними делать?"
 rse_reconquest.0006.a:0 "Пусть процветают по-своему."
 rse_reconquest.0006.b:0 "Полностью арабизировать — язык, обычаи, всё."
 rse_reconquest.0006.c:0 "Любопытство, и не более. Оставить их в покое."

 rse_crusade.0001.t:0 "Сарацинское графство под крестом"
 rse_crusade.0001.desc:0 "[conquered_county.GetName] ваше. [imam.GetTitledFirstName], местный имам, молит за свою паству. Епископы требуют, чтобы минареты были обрушены. Какова ваша воля?"
 rse_crusade.0001.a:0 "Обратить все мечети в церкви. Крест ныне здесь."
 rse_crusade.0001.b:0 "Пусть живут — но за надлежащую дань."
 rse_crusade.0001.c:0 "Мы будем править справедливо, людьми всякой веры."

 rse_crusade.0002.t:0 "Рыцари Ордена"
 rse_crusade.0002.desc:0 "[templar.GetTitledFirstName], рыцарь святого ордена, явился ко двору. Он предлагает, чтобы его братья несли гарнизон в [frontier_county.GetName] — за земли, золото или просто милость Божию."
 rse_crusade.0002.a:0 "Доверить им гарнизон. Граница нуждается в них."
 rse_crusade.0002.b:0 "Дать золота в казну ордена. (-100 золота)"
 rse_crusade.0002.c:0 "Отказать. Эти рыцари не подчиняются никому, кроме своего магистра."

 rse_crusade.0003.t:0 "Сарацинский набег"
 rse_crusade.0003.desc:0 "Всадники проносятся через [raided_county.GetName] — сарацинская конница из-за границы, отплачивающая кровью и огнём за наше завоевание."
 rse_crusade.0003.a:0 "Поднять крест — в погоню! (-100 золота)"
 rse_crusade.0003.b:0 "Пусть мусульманские деревни горят. Они никогда не были вполне нашими."
 rse_crusade.0003.c:0 "Укрепить рубежи. (-50 золота)"

 rse_crusade.0004.t:0 "Верующие не склонятся"
 rse_crusade.0004.desc:0 "[muslim_rebel_county.GetName] становится беспокойным. Призыв муэдзина не звучит, мечети молчат — а мужчины собираются в закоулках со сталью под одеждой."
 rse_crusade.0004.a:0 "Обратить их — мечом, коль не словом."
 rse_crusade.0004.b:0 "Изгнать. Пусть земля родится заново."
 rse_crusade.0004.c:0 "Даровать им мир. Терпимость — христианская добродетель."

 rse_heresy.0001.t:0 "Еретический проповедник"
 rse_heresy.0001.desc:0 "[heretic_preacher.GetTitledFirstName] проповедует на рынках [preacher_county.GetName]. Его учения извращают истинную веру — и всё же люди собираются слушать, жаждущие новых слов."
 rse_heresy.0001.a:0 "Сжечь еретика. Пусть пепел его станет предостережением."
 rse_heresy.0001.b:0 "Изгнать из наших земель."
 rse_heresy.0001.c:0 "Призвать его. Я выслушаю его доводы."

 rse_heresy.0002.t:0 "Собор о догмате"
 rse_heresy.0002.desc:0 "[learned_theologian.GetTitledFirstName] предлагает созвать собор, дабы разрешить догматический спор, расколовший духовенство. Верующие ждут вашего ответа."
 rse_heresy.0002.a:0 "Созвать собор. Я назову истину. (-100 благочестия)"
 rse_heresy.0002.b:0 "Пусть духовенство само разрешит спор."
 rse_heresy.0002.c:0 "Ни одна сторона не вполне права. Заставить замолчать всех."

 rse_heresy.0003.t:0 "Мистик в горах"
 rse_heresy.0003.desc:0 "[mystic.GetTitledFirstName] живёт в пещере близ [mystic_county.GetName]. Одни паломники говорят, что он беседует с ангелами. Другие — что с бесами. Сам он не просит ничего — лишь чтобы его оставили в покое."
 rse_heresy.0003.a:0 "Привести его ко двору. Такая мудрость редка."
 rse_heresy.0003.b:0 "Вытащить и казнить."
 rse_heresy.0003.c:0 "Посетить его тайно. Я бы выслушал его слова."

 rse_heresy.0004.t:0 "Вассал впал в ересь"
 rse_heresy.0004.desc:0 "[heretic_vassal.GetTitledFirstName] был замечен на еретических сходах — и хуже того, открыто исповедует ересь. Гниль в сердце державы."
 rse_heresy.0004.a:0 "В подземелье его."
 rse_heresy.0004.b:0 "Наблюдать пристально. Мудрый правитель не бьёт сгоряча."
 rse_heresy.0004.c:0 "Подкупить его капеллана, дабы он вернул его. (-75 золота)"

 rse_relic.0001.t:0 "Святая реликвия на продажу"
 rse_relic.0001.desc:0 "[relic_merchant.GetTitledFirstName] показывает позолоченный ковчежец, утверждая, что в нём кость святого, щепка от истинного креста — а быть может, волос Пророка. Цена велика."
 rse_relic.0001.a:0 "Купить реликвию. (-200 золота)"
 rse_relic.0001.b:0 "Это подлог. Выгнать его."
 rse_relic.0001.c:0 "Вежливо отказать. Вера не нуждается в позолоченных костях."

 rse_relic.0002.t:0 "Паломник возвращается"
 rse_relic.0002.desc:0 "[pilgrim.GetTitledFirstName] вернулся из долгого паломничества к великой святыне. Лицо изможденное, но глаза горят странным огнём. Он просит аудиенции."
 rse_relic.0002.a:0 "Принять его как брата по вере."
 rse_relic.0002.b:0 "Наградить его благочестие золотом. (-50 золота)"
 rse_relic.0002.c:0 "Паломники сеют смуту. Прогнать его."

 rse_relic.0003.t:0 "Чудо узрено"
 rse_relic.0003.desc:0 "Весть из [miracle_county.GetName]: крестьянская девушка, говорят, плакала кровавыми слезами пред иконой, а хромой ребёнок встал и пошёл. Стекаются толпы."
 rse_relic.0003.a:0 "Провозгласить истинным чудом! Построить святыню."
 rse_relic.0003.b:0 "Расследовать. Мы не дадим себя обмануть."
 rse_relic.0003.c:0 "Взимать пошлину с паломников. (+75 золота)"

 rse_relic.0004.t:0 "Зов главы веры"
 rse_relic.0004.desc:0 "[pontiff.GetTitledFirstName], глава нашей веры, прислал письмо с требованием дани на священные войны. Печать тяжела. Казначей морщится."
 rse_relic.0004.a:0 "Заплатить дань с радостью. (-150 золота)"
 rse_relic.0004.b:0 "Отказать. Мы ничего не должны."
 rse_relic.0004.c:0 "Пусть капеллан составит дипломатичный ответ."

 rse_pagan.0001.t:0 "Священная роща"
 rse_pagan.0001.desc:0 "В лесах [grove_county.GetName] ваши лесники обнаружили древнюю рощу — на ветвях висят кости и подношения, алтарь до сих пор обагрён кровью. Старые боги ещё не мертвы."
 rse_pagan.0001.a:0 "Сжечь её до корней."
 rse_pagan.0001.b:0 "Оставить. Иное древнее нас."
 rse_pagan.0001.c:0 "Возвести часовню на этом месте. (-50 золота)"

 rse_pagan.0002.t:0 "Язычники в моих землях"
 rse_pagan.0002.desc:0 "По воскресеньям крестьяне [pagan_village.GetName] клянутся истинной верой — но в безлунные ночи уходят в леса оставлять подношения старым богам."
 rse_pagan.0002.a:0 "Послать миссионера. Терпение обращает лучше мечей. (-25 золота)"
 rse_pagan.0002.b:0 "Войти со сталью. Положить конец."
 rse_pagan.0002.c:0 "Пусть верят обоим. Вера — личное."

 rse_pagan.0003.t:0 "Язычник у ворот"
 rse_pagan.0003.desc:0 "[pagan_warrior.GetTitledFirstName], воин из холодных земель севера, не услышавший истинного слова, явился предложить свой меч. Знаменит, свиреп — и язычник."
 rse_pagan.0003.a:0 "Принять его службу. Меч не печётся о душе."
 rse_pagan.0003.b:0 "Служба — но прежде крещение."
 rse_pagan.0003.c:0 "Выгнать его. Не нужны нам язычники."

 rse_jewish.0001.t:0 "Прошение еврейской общины"
 rse_jewish.0001.desc:0 "[jewish_elder.GetTitledFirstName], старейшина еврейской общины [jewish_quarter.GetName], явился с дарами и прошением. Евреи вашего домена просят грамоту о защите."
 rse_jewish.0001.a:0 "Даровать грамоту. Их торговля обогащает нас всех."
 rse_jewish.0001.b:0 "Защита — за особую подать. (+150 золота)"
 rse_jewish.0001.c:0 "Изгнать всех. Сперва их золото, потом их спины."

 rse_jewish.0002.t:0 "Заём в тяжёлые времена"
 rse_jewish.0002.desc:0 "[moneylender.GetTitledFirstName], еврейский ростовщик, прослышал о вашей пустой казне. Предлагает заём под умеренный процент — лишь под вашу печать."
 rse_jewish.0002.a:0 "Принять заём. (+300 золота)"
 rse_jewish.0002.b:0 "Взять — и снять с него голову. Долг умрёт с ним. (+200 золота)"
 rse_jewish.0002.c:0 "Отказать. Я не склонюсь к ростовщичеству."

 rse_jewish.0003.t:0 "Погром на улицах"
 rse_jewish.0003.desc:0 "Странствующий проповедник распалил крестьян [pogrom_county.GetName] яростью против евреев. С наступлением сумерек собираются факелы. Ждут лишь вашего кивка — или запрета."
 rse_jewish.0003.a:0 "Послать стражу защитить квартал."
 rse_jewish.0003.b:0 "Пусть толпа действует — а добыча наша. (+100 золота)"
 rse_jewish.0003.c:0 "Промолчать. Это нас не касается."

 rse_faith.0001.t:0 "Кризис веры"
 rse_faith.0001.desc:0 "Долгой бессонной ночью вы спрашиваете себя: значат ли молитвы то же, что прежде? Вы правили, проливали кровь, хоронили — но ждёт ли вас то небо, что было обещано?"
 rse_faith.0001.a:0 "Возобновить обеты. Молиться усерднее прежнего."
 rse_faith.0001.b:0 "Признать: я больше не верю."
 rse_faith.0001.c:0 "Похоронить вопрос. Нет на него времени."

 rse_faith.0002.t:0 "Обет пред Богом"
 rse_faith.0002.desc:0 "Капеллан предлагает принять великий обет пред алтарём — связать вашу волю с Богом, явить публичный знак благочестия. Какой обет вы дадите?"
 rse_faith.0002.a:0 "Обет целомудрия."
 rse_faith.0002.b:0 "Обет нищеты. (-100 золота)"
 rse_faith.0002.c:0 "Обет паломничества."
 rse_faith.0002.d:0 "Никакого обета. Слова — ветер."

 rse_faith.0003.t:0 "Чужеземный святой муж"
 rse_faith.0003.desc:0 "[foreign_holy_man.GetTitledFirstName], учёный муж иной веры, неделями гостит при вашем дворе. Он беседовал с вами до глубокой ночи — и ныне спрашивает: не подумаете ли вы о его вере?"
 rse_faith.0003.a:0 "Прогнать его немедля. Я не поддамся искушению."
 rse_faith.0003.b:0 "Он глаголет истину... Я приму его веру."
 rse_faith.0003.c:0 "Пусть остаётся. Слышать — не значит соглашаться."

 rse_anathema.0001.t:0 "Угроза анафемы"
 rse_anathema.0001.desc:0 "Прибывает гонец от [pontiff.GetTitledFirstName] с письмом, запечатанным красным сургучом. Оно предупреждает, что ваше недостаточное благочестие привлекло внимание главы веры — и анафема последует, если не покаетесь."
 rse_anathema.0001.a:0 "Послать щедрый дар. (-100 золота)"
 rse_anathema.0001.b:0 "Босиком прийти в собор. Явить смирение."
 rse_anathema.0001.c:0 "Пусть попробуют. Я здесь правлю, не они."

 rse_anathema.0002.t:0 "Соперник пал в немилость"
 rse_anathema.0002.desc:0 "Весть: [fallen_rival.GetTitledFirstName] отлучён главой нашей веры. Держава бурлит. Воспользоваться или отвергнуть — ваш выбор."
 rse_anathema.0002.a:0 "Публично обличить! Использовать преимущество."
 rse_anathema.0002.b:0 "Встать с ним в час нужды."
 rse_anathema.0002.c:0 "Наблюдать из тени. Не моё дело."

 rse_anathema.0003.t:0 "Ревнитель ищет мученичества"
 rse_anathema.0003.desc:0 "[zealot.GetTitledFirstName], пылкий член вашего двора, просил аудиенции. Он желает отправиться с опасной миссией обращать неверных — зная, что, вероятно, заплатит за это жизнью."
 rse_anathema.0003.a:0 "Оплатить миссию. Да пребудет с ним Господь. (-75 золота)"
 rse_anathema.0003.b:0 "Тихо его умертвить. Такие фанатики опасны."
 rse_anathema.0003.c:0 "Отказать — и удалить со двора."

 rse_slave.0001.t:0 "Невольничий рынок в домене"
 rse_slave.0001.desc:0 "[slave_trader.GetTitledFirstName] предлагает открыть невольничий рынок в [market_county.GetName]. Сакалиба с севера, зинджи с юга, военнопленные со всех фронтов — все переходят из рук в руки за серебро."
 rse_slave.0001.a:0 "Пусть откроется. Монета потечёт."
 rse_slave.0001.b:0 "В моих землях не будет работорговли. Прогнать его."
 rse_slave.0001.c:0 "Открыть, но строго регулировать. Никаких единоверцев."

 rse_slave.0002.t:0 "Караван рабов прибыл"
 rse_slave.0002.desc:0 "[slaver.GetTitledFirstName] вводит во двор караван закованных в цепи. Среди них первым предлагают [saqlabi.GetTitledFirstName], светловолосого пленника из славянских земель. Торговец называет цену."
 rse_slave.0002.a:0 "Купить. Будут служить. (-75 золота)"
 rse_slave.0002.b:0 "Купить, окрестить, возвысить. (-150 золота)"
 rse_slave.0002.c:0 "Изгнать караван за ворота."

 rse_slave.0003.t:0 "Учредить корпус мамлюков"
 rse_slave.0003.desc:0 "[mamluk_commander.GetTitledFirstName], мальчик-куман, захваченный на войне и взращённый воином ислама, преклоняет колени. Он предлагает учредить корпус воинов-рабов — фанатично верных, не связанных кланом, присягнувших лишь вам."
 rse_slave.0003.a:0 "Учредить корпус. Они станут моей железной рукой. (-200 золота)"
 rse_slave.0003.b:0 "Мне служат свободные. Корпуса не будет."

 rse_slave.0004.t:0 "Восстание рабов"
 rse_slave.0004.desc:0 "Над [revolt_county.GetName] поднимается дым. Рабы восстали — надсмотрщики перебиты, оковы сброшены, склады горят. Они требуют свободы — или смерти."
 rse_slave.0004.a:0 "Раздавить. Повесить всех уцелевших. (-75 золота)"
 rse_slave.0004.b:0 "Освободить. Расселить на земле."
 rse_slave.0004.c:0 "Откупиться — обещать лучшие условия. (-40 золота)"

 rse_slave.0005.t:0 "Акт манумиссии"
 rse_slave.0005.desc:0 "[freedman.GetTitledFirstName], старый домашний раб, склоняется пред вами. Капеллан говорит, что Богу угодно было бы освободить его. Управляющий — что это лишит хозяйство полезного слуги."
 rse_slave.0005.a:0 "Освободить. Да узрит Господь и помянет."
 rse_slave.0005.b:0 "Продать с выгодой. (+50 золота)"
 rse_slave.0005.c:0 "Изгнать. Мне он более не нужен."

 rse_slave.0006.t:0 "Христиане для выкупа"
 rse_slave.0006.desc:0 "Прибывает делегация монахов-тринитариев. Они молят профинансировать выкуп христианских пленников с сарацинских невольничьих рынков. Цена высока — но всякая спасённая душа есть спасённая душа."
 rse_slave.0006.a:0 "Выкупить всех. (-150 золота)"
 rse_slave.0006.b:0 "Выкупить, сколько смогу. (-50 золота)"
 rse_slave.0006.c:0 "Не могу. Державе нужна всякая монета."

 rse_slave.0007.t:0 "Невольники с набега"
 rse_slave.0007.desc:0 "Ваши воины возвращаются с драккаром, полным невольников — мужей и жён в цепях, обречённых на труд в [thrall_county.GetName]. Хёвдинги ждут вашего слова."
 rse_slave.0007.a:0 "На работы. Поля жаждут."
 rse_slave.0007.b:0 "Освободить. Будут вольноотпущенниками, а не скотом."
 rse_slave.0007.c:0 "Продать всех на торгу. (+200 золота)"

 rse_slave.0008.t:0 "Любимая наложница"
 rse_slave.0008.desc:0 "[concubine.GetTitledFirstName], попавшая в ваш дом рабой, стала вам близка. Капеллан намекает, что акт манумиссии воздал бы честь и вам, и Богу."
 rse_slave.0008.a:0 "Освободить. Её преданность заслуживает не меньшего."
 rse_slave.0008.b:0 "Останется моей. Привязанность не повод для глупостей. (+50 золота)"
 rse_slave.0008.c:0 "Прогнать. Не поддамся искушению."

 rse_reconquest.0007.t:0 "Христианский лорд склоняется"
 rse_reconquest.0007.desc:0 "[christian_noble.GetTitledFirstName], отпрыск древнего христианского рода из [noble_county.GetName], явился ко двору с опущенной головой. Он предлагает меч, знамя и верность — лишь бы сохранить наследные земли."
 rse_reconquest.0007.a:0 "Принять его клятву. Полезный пособник."
 rse_reconquest.0007.b:0 "Земли сохранит — но прежде примет шахаду."
 rse_reconquest.0007.c:0 "Старая кровь должна уйти. Плаха ждёт."

 rse_reconquest.0008.t:0 "Колокольня или минарет"
 rse_reconquest.0008.desc:0 "Великий собор [cathedral_county.GetName] стоит в сердце города — в его колокола звонят христианские руки. Имамы требуют, чтобы он был обращён Аллаху. Как поступить?"
 rse_reconquest.0008.a:0 "Превратить в великую мечеть. (-100 золота)"
 rse_reconquest.0008.b:0 "Разделить — пятница нам, воскресенье им."
 rse_reconquest.0008.c:0 "Снести. Камень за камнем."

 rse_reconquest.0009.t:0 "Мощи святого"
 rse_reconquest.0009.desc:0 "В подземелье под [relic_county.GetName] покоятся мощи древнего христианского святого — кости в позолоченном ковчеге, говорят, творят чудеса. Христиане всё ещё приходят молиться. Казна смотрит голодно."
 rse_reconquest.0009.a:0 "Снять золото. Кости ничего не стоят. (+200 золота)"
 rse_reconquest.0009.b:0 "Оставить святыню в покое. Мы не варвары."
 rse_reconquest.0009.c:0 "Сжечь кости. Их святой не побеспокоит нас более."

 rse_reconquest.0010.t:0 "Пленная дворянка"
 rse_reconquest.0010.desc:0 "[noblewoman.GetTitledFirstName], дворянка из христианских земель, взята в плен в последней кампании. Она стоит на коленях, ожидая вашего решения — выкуп, обращение, или гарем."
 rse_reconquest.0010.a:0 "Вернуть её родне за выкуп. (+100 золота)"
 rse_reconquest.0010.b:0 "Освободить — если примет шахаду."
 rse_reconquest.0010.c:0 "Будет служить в моём доме. (+50 золота)"

 rse_reconquest.0011.t:0 "Прошение о миллете"
 rse_reconquest.0011.desc:0 "[millet_leader.GetTitledFirstName], глава христиан [millet_county.GetName], молит, чтобы его людям дозволили вести свои дела самим — суды, школы, законы — под вашей верховной властью."
 rse_reconquest.0011.a:0 "Даровать миллет. Пусть каждый народ живёт по-своему."
 rse_reconquest.0011.b:0 "Нет. Живут под нашим законом, как всякий подданный."
 rse_reconquest.0011.c:0 "Продать право самоуправления. (+75 золота)"

 rse_reconquest.0012.t:0 "Христианский мальчик"
 rse_reconquest.0012.desc:0 "[christian_boy.GetTitledFirstName], христианский мальчик, взятый из [devshirme_county.GetName], доставлен к вашему двору. Ясные глаза, острый ум — задатки будущего слуги империи."
 rse_reconquest.0012.a:0 "Воспитать мусульманином. Он будет одним из нас."
 rse_reconquest.0012.b:0 "Обучить при дворе. Пусть сохранит свою веру."
 rse_reconquest.0012.c:0 "Вернуть его народу."

 rse_reconquest.0013.t:0 "Суфий у врат"
 rse_reconquest.0013.desc:0 "[sufi.GetTitledFirstName], странствующий суфийский мистик, явился ко двору. Он предлагает построить обитель в [sufi_county.GetName] и завоёвывать сердца христиан кротостью — не мечом."
 rse_reconquest.0013.a:0 "Оплатить обитель. Пусть любовь сделает, чего сталь не может. (-50 золота)"
 rse_reconquest.0013.b:0 "Меч быстрее. Прогнать его."
 rse_reconquest.0013.c:0 "Пусть попробует, но не возлагаю надежд."

 rse_reconquest.0014.t:0 "Христианские паруса на горизонте"
 rse_reconquest.0014.desc:0 "Над побережьем [coastal_county.GetName] поднимается дым — христианский флот, быть может, из-за моря, разграбил деревню. Изгнанные христианские семьи графства, возможно, приветствовали их."
 rse_reconquest.0014.a:0 "Поставить гарнизон у моря. (-75 золота)"
 rse_reconquest.0014.b:0 "Взять заложников из местной знати."
 rse_reconquest.0014.c:0 "Принять потерю. Такова цена империи."

 rse_reconquest.0015.t:0 "Месса в катакомбах"
 rse_reconquest.0015.desc:0 "Под улицами [vault_county.GetName] ваши шпионы нашли сводчатую залу, где христиане ещё собираются на мессу — при свечах, шёпотом, когда думают, что их не видят."
 rse_reconquest.0015.a:0 "Запечатать катакомбы. Кирпич за кирпичом."
 rse_reconquest.0015.b:0 "Прикинуться, что не знаем. Тайная вера — не вера."
 rse_reconquest.0015.c:0 "Найти всех — и утроить им джизью."

 rse_reconquest.0016.t:0 "Аскет требует строгости"
 rse_reconquest.0016.desc:0 "[ascetic.GetTitledFirstName], пустынник, изнурённый постом, явился ко двору. Он осуждает вашу терпимость — христианок без покрывал, нерасколотые колокола, зимми, что ходят слишком гордо. Вера, говорит он, теряется."
 rse_reconquest.0016.a:0 "Он глаголет истину. Затянуть гайки."
 rse_reconquest.0016.b:0 "Фанатики опасны. Прогнать его."
 rse_reconquest.0016.c:0 "Отрубить голову за дерзость. Я здесь закон."

 rse_reconquest.0017.t:0 "Брак двух миров"
 rse_reconquest.0017.desc:0 "Знать [bride_county.GetName] предлагает брак — [christian_bride.GetTitledFirstName] из старой христианской знати войдёт в ваш дом. Союз легитимизирует вашу власть среди завоёванных."
 rse_reconquest.0017.a:0 "Принять. Пусть два мира станут одним через брак."
 rse_reconquest.0017.b:0 "Только после обращения. Прежде шахада, потом ложе."
 rse_reconquest.0017.c:0 "Отказать. Моя кровь не смешается с их."

 rse_reconquest.0018.t:0 "Вероотступник бежит"
 rse_reconquest.0018.desc:0 "[apostate.GetTitledFirstName], недавно обращённый в ислам, задержан на границе с крестом, спрятанным под рубахой. Он бежал назад в Христендом — умереть христианином, как он говорит."
 rse_reconquest.0018.a:0 "Смерть — цена отступничества. Обезглавить."
 rse_reconquest.0018.b:0 "Заточить. Быть может, молитва спасёт его душу."
 rse_reconquest.0018.c:0 "Отпустить. Принуждённый верующий — не верующий."

 rse_reconquest.0019.t:0 "Восстановить город"
 rse_reconquest.0019.desc:0 "[ruined_county.GetName] всё ещё несёт шрамы завоевания — сожжённые кварталы, обрушенные стены, наполовину разбежавшееся население. Восстановление может завоевать сердца — или опустошить казну."
 rse_reconquest.0019.a:0 "Великое восстановление — сады, фонтаны, всё. (-200 золота)"
 rse_reconquest.0019.b:0 "Залатать, что сломано. (-100 золота)"
 rse_reconquest.0019.c:0 "Пусть гниёт. У нас новые земли для завоевания."

 rse_reconquest.0020.t:0 "Спор вер"
 rse_reconquest.0020.desc:0 "[debater_priest.GetTitledFirstName], учёный священник из-за границы, предлагает публичный диспут с [court_imam.GetTitledFirstName] о достоинствах их вер. Двор собрался, вино налито, любопытство держит залу."
 rse_reconquest.0020.a:0 "Нет тут диспутов. Снять с него голову."
 rse_reconquest.0020.b:0 "Пусть говорит. Мудрый правитель слушает всех."
 rse_reconquest.0020.c:0 "Он повержен. Пусть примет шахаду — или умрёт."

 rse_captive.0001.t:0 "Железо и солома"
 rse_captive.0001.desc:0 "Камера холодна, солома смердит, и стража [captor.GetTitledFirstName] взирает на вас с откровенным презрением. Первые дни в цепях задают тон всему дальнейшему."
 rse_captive.0001.a:0 "Сунуть тюремщикам серебро. (-50 золота)"
 rse_captive.0001.b:0 "Терпеть с достоинством. Слабости не увидят."
 rse_captive.0001.c:0 "Молить о пощаде. Я не воин."

 rse_captive.0002.t:0 "Обратись или сгниёшь"
 rse_captive.0002.desc:0 "[captor.GetTitledFirstName] посещает вашу камеру с предложением: отрекись от веры, прими его, и в тот же час выйди на свободу. Откажешься — сгниёшь."
 rse_captive.0002.a:0 "Обратиться. Жизнь прежде всего."
 rse_captive.0002.b:0 "Никогда. Умру в своей вере."
 rse_captive.0002.c:0 "Притвориться обращённым — отрекусь, едва выйду."

 rse_captive.0003.t:0 "Открытая дверь"
 rse_captive.0003.desc:0 "Беспечная рука стражника, подкупленный слуга, незапертая решётка — обстоятельства сошлись. Попытка побега возможна, если хватит духу."
 rse_captive.0003.a:0 "Бежать!"
 rse_captive.0003.b:0 "Ждать. Час ещё не пробил."

 rse_captive.0004.t:0 "Гостья при свече"
 rse_captive.0004.desc:0 "[visitor.GetTitledFirstName] из домочадцев [captor.GetTitledFirstName] проскальзывает в вашу камеру при свече. Говорит тихо — жалеет вас. Поможет за плату... а быть может и даром."
 rse_captive.0004.a:0 "С благодарностью принять дружбу."
 rse_captive.0004.b:0 "Отказать. Не буду в долгу перед роднёй тюремщика."
 rse_captive.0004.c:0 "Донести на неё тюремщику."

 rse_captive.0005.t:0 "Подпиши отказ от земель"
 rse_captive.0005.desc:0 "[captor.GetTitledFirstName] входит в камеру со свитком. Условия записаны: сдай графство — и свободен. Откажись — будешь гнить, пока кости не выбелит."
 rse_captive.0005.a:0 "Подписать. Титул бесполезен мертвецу."
 rse_captive.0005.b:0 "Никогда. Печать вырвут из моей мёртвой руки."

 rse_captive.0006.t:0 "Шёпот сокамерника"
 rse_captive.0006.desc:0 "[cellmate.GetTitledFirstName], делящий с вами камеру, сидит здесь дольше. Знает ритмы стражи, слабые стены, подкупного повара. Предлагает совместный побег."
 rse_captive.0006.a:0 "Бежать вместе."
 rse_captive.0006.b:0 "Использовать его знания, чтобы подкупить тюремщиков самому."
 rse_captive.0006.c:0 "Выдать его тюремщику. Сведения ценны."

 rse_captive.0007.t:0 "Торг работорговца"
 rse_captive.0007.desc:0 "[captor.GetTitledFirstName] не хочет более возиться с вами. Выбор прост: заплатить высокий выкуп, стать рабом, или сгнить здесь навеки."
 rse_captive.0007.a:0 "Заплатить выкуп. (-150 золота)"
 rse_captive.0007.b:0 "Принять цепи. Лучше раб, чем мертвец."
 rse_captive.0007.c:0 "Бросить вызов им обоим. Я не скот."

 rse_bondage.0001.t:0 "Первые дни в цепях"
 rse_bondage.0001.desc:0 "Ошейник давит на шею. Дом [master.GetTitledFirstName] — странный новый мир: господа и надсмотрщики, такие же рабы и слуги. Как вы себя поведёте теперь, определит годы вперёд."
 rse_bondage.0001.a:0 "Терпеть с достоинством. Не сломают меня."
 rse_bondage.0001.b:0 "Заслужить место. Быть полезной, быть в доверии."
 rse_bondage.0001.c:0 "Склонить голову — но не сердце."

 rse_bondage.0002.t:0 "Зов в опочивальню"
 rse_bondage.0002.desc:0 "В сумерках за вами приходит слуга: [master.GetTitledFirstName] желает вашего общества этой ночью. Выбор за вами лишь на словах — но то, как вы ответите, определит дальнейшее."
 rse_bondage.0002.a:0 "Покориться. Быть может, так заслужу милость."
 rse_bondage.0002.b:0 "Отказать — и принять плеть."
 rse_bondage.0002.c:0 "Покориться, улыбаться и плести. Время на моей стороне."

 rse_bondage.0003.t:0 "Супруга господина"
 rse_bondage.0003.desc:0 "[jealous_spouse.GetTitledFirstName] встречает вас в коридоре. Без крика — лишь тихие, смертоносные слова. Делить ложе она не будет. Скоро господин услышит о вас. Или вы о ней."
 rse_bondage.0003.a:0 "Стоять на своём. Господин благоволит мне."
 rse_bondage.0003.b:0 "Извиниться. Предложить отступить."
 rse_bondage.0003.c:0 "Улыбнуться и поклониться — и начать строить план."

 rse_bondage.0004.t:0 "Шёпот в людской"
 rse_bondage.0004.desc:0 "[fellow_slave.GetTitledFirstName] подходит к вам в темноте рабских покоев. У него план — через дверь кухни, мимо конюшен, в лес за стенами. Рискнёте?"
 rse_bondage.0004.a:0 "Бежать вместе, в ночь."
 rse_bondage.0004.b:0 "Отказаться — но сохранить тайну."
 rse_bondage.0004.c:0 "Сказать господину. Верность вознаграждается."

 rse_bondage.0005.t:0 "Мольба о свободе"
 rse_bondage.0005.desc:0 "Наконец, миг наступил: наедине с [master.GetTitledFirstName] вы находите слова. Молите о свободе — о возможности выйти из этих стен своим человеком."
 rse_bondage.0005.a:0 "Молить открыто. Положиться на милость."
 rse_bondage.0005.b:0 "Взять слова назад. Лучше выждать, чем унижаться."

 rse_bondage.0006.t:0 "Дитя господина"
 rse_bondage.0006.desc:0 "Повитуха подтверждает то, чего вы боялись — и на что надеялись. Дитя [master.GetTitledFirstName] растёт в вас. Дом скоро узнает. То, что вы скажете первой, многое решит."
 rse_bondage.0006.a:0 "Сказать господину. Дитя — это власть."
 rse_bondage.0006.b:0 "Скрывать сколько возможно."
 rse_bondage.0006.c:0 "В этом доме есть женщины, что знают травы..."

 rse_bondage.0007.t:0 "Продана"
 rse_bondage.0007.desc:0 "Монеты переходят из рук в руки. [old_master.GetTitledFirstName] продал вас [new_master.GetTitledFirstName]. Новый дом, новый ошейник, те же цепи. Какой рабыней вы будете на сей раз?"
 rse_bondage.0007.a:0 "Начать сначала. Быть полезной с первого дня."
 rse_bondage.0007.b:0 "Перечить новому господину на каждом шагу."

 rse_bondage.0008.t:0 "Господин слёг"
 rse_bondage.0008.desc:0 "[master.GetTitledFirstName] слёг в горячке. Дом в смятении, повар зовёт рабыню принести суп и ухаживать ночами. Вас вызвали."
 rse_bondage.0008.a:0 "Преданно ухаживать. Верность могут запомнить."
 rse_bondage.0008.b:0 "Кое-что в суп, быть может..."
 rse_bondage.0008.c:0 "Сделать долг. Ни больше, ни меньше."

 rse_bondage.0009.t:0 "Наследник господина"
 rse_bondage.0009.desc:0 "[heir.GetTitledFirstName], дитя [master.GetTitledFirstName], стал искать предлоги быть рядом с вами. Взгляд задерживается, рука касается. Новая игра началась, и вы снова приз."
 rse_bondage.0009.a:0 "Приветствовать внимание. Наследник — будущее."
 rse_bondage.0009.b:0 "Холодно отвергнуть. Господин — это господин."
 rse_bondage.0009.c:0 "Поощрять втайне — карта в рукаве."

 rse_bondage.0010.t:0 "Петь для двора"
 rse_bondage.0010.desc:0 "Пир в самом разгаре. Господин хлопает в ладоши и указывает на вас — пой, танцуй, сделай что-нибудь красивое для гостей. Зала смолкает в ожидании."
 rse_bondage.0010.a:0 "Выступить со всем изяществом."
 rse_bondage.0010.b:0 "Стоять молча. Не будет им забавы."
 rse_bondage.0010.c:0 "Выступить — и внимательно слушать всё, что говорят вокруг."

 rse_bondage.0011.t:0 "Поймана с монетой"
 rse_bondage.0011.desc:0 "Управляющий ловит вас с горстью серебра из кухонной чаши. Дом замирает. Господину доложат. Лучше иметь готовый ответ."
 rse_bondage.0011.a:0 "Солгать. Свалить на повара."
 rse_bondage.0011.b:0 "Сознаться и молить о прощении."
 rse_bondage.0011.c:0 "Молчать. Пусть господин решит."

 rse_bondage.0012.t:0 "Предложение гостя"
 rse_bondage.0012.desc:0 "[visiting_noble.GetTitledFirstName], знатный гость из дальнего двора, весь вечер не сводил с вас глаз. Поздно ночью загоняет в угол и предлагает: уйти с ним, и за этим последует новый ошейник — но мягче."
 rse_bondage.0012.a:0 "Согласиться. Куда угодно, лишь не сюда."
 rse_bondage.0012.b:0 "Отказать. Известный господин лучше."
 rse_bondage.0012.c:0 "Слушать внимательно — и запомнить имя."

 rse_bondage.0013.t:0 "Паломник с родины"
 rse_bondage.0013.desc:0 "[pilgrim.GetTitledFirstName], паломник вашей веры и языка, получил подаяние у ворот. Говорит тихо — вести с родины, имена, что вы помните, мир, что ещё существует за этими стенами."
 rse_bondage.0013.a:0 "Принять его благословение. Молиться с ним."
 rse_bondage.0013.b:0 "Молить, чтобы донёс весть домой."
 rse_bondage.0013.c:0 "Донести. Верный раб не плачет по дому."

 rse_bondage.0014.t:0 "Господин мёртв"
 rse_bondage.0014.desc:0 "Звон колокола — господина не стало. [new_master.GetTitledFirstName] ныне держит ключи от вашего ошейника. Какой рабыней вы выберете быть в этом новом доме?"
 rse_bondage.0014.a:0 "Присягнуть на службу. Новый господин — новое начало."
 rse_bondage.0014.b:0 "Молить нового господина о свободе в его скорби."
 rse_bondage.0014.c:0 "Ускользнуть в суматохе."

 rse_bondage.0015.t:0 "Святая милостыня у врат"
 rse_bondage.0015.desc:0 "[holy_man.GetTitledFirstName], святой муж вашей веры, явился с подаянием — золото, собранное верующими, чтобы выкупить рабов истинной веры у неверных. Он смотрит на вас с надеждой, а на [master.GetTitledFirstName] с терпением."
 rse_bondage.0015.a:0 "Молить господина принять выкуп!"
 rse_bondage.0015.b:0 "Молиться со святым мужем. Вера прежде свободы."
 rse_bondage.0015.c:0 "Перейти в веру господина. Покончить с торгом."

 rse_bondage.0016.t:0 "На песок"
 rse_bondage.0016.desc:0 "Сталь вкладывают в руку. Ворота скрипят, открываясь. За ними — песок, солнце, толпа, жадная до крови, и другой раб с клинком, такой же отчаянный, как и ты. [master.GetTitledFirstName] смотрит из ложи."
 rse_bondage.0016.a:0 "Биться, чтобы победить. Толпа любит выживших."
 rse_bondage.0016.b:0 "Отказаться проливать кровь. Пусть устраивают зрелище в другом месте."

 rse_bondage.0017.t:0 "Шахта и весло"
 rse_bondage.0017.desc:0 "Тебя отправляют в самые глубокие владения [master.GetTitledFirstName] — рудник, каменоломня, скамья галеры. Годы тяжкого труда обещают согнуть спину в знак вопроса."
 rse_bondage.0017.a:0 "Согнуть спину. Терпеть."
 rse_bondage.0017.b:0 "Ускользнуть во тьму."
 rse_bondage.0017.c:0 "Молиться. Господь хранит сломленных."

 rse_bondage.0018.t:0 "Путь мамлюка"
 rse_bondage.0018.desc:0 "[drillmaster.GetTitledFirstName] оглядывает тебя солдатским взглядом. Плечи, скорость, твёрдость — всё подходит. Согласишься на обучение мамлюком, воином-рабом веры?"
 rse_bondage.0018.a:0 "Согласиться. Принять шахаду и меч."
 rse_bondage.0018.b:0 "Отказаться. Умру в своей вере."
 rse_bondage.0018.c:0 "Принять меч — но сохранить веру втайне."

 rse_bondage.0019.t:0 "Нож"
 rse_bondage.0019.desc:0 "Господин решил: ты слишком полезен и слишком опасен, чтобы оставлять целым. Гарему нужен страж. Нож готов. Вопрос лишь в том, дойдёшь ли ты до него своими ногами."
 rse_bondage.0019.a:0 "Покориться. Разрез короток, жизнь после — длинна."
 rse_bondage.0019.b:0 "Подкупить лекаря пощадить меня. (-100 золота)"
 rse_bondage.0019.c:0 "Прорываться с боем — не дам себя оскопить!"

 rse_bondage.0020.t:0 "Плеть в твоей руке"
 rse_bondage.0020.desc:0 "Старый надсмотрщик умер. [master.GetTitledFirstName] обводит взглядом ряд и указывает на тебя — ныне ты возьмёшь плеть. Будешь держать остальных в узде. Выбор за тобой: стать бичом — или отказаться и почувствовать его."
 rse_bondage.0020.a:0 "Взять плеть. Править, чтобы выжить."
 rse_bondage.0020.b:0 "Отказаться. Не стану тем, кого презираю."
 rse_bondage.0020.c:0 "Взять — и пользоваться осторожно. Рабы могут быть полезны."

 rse_bondage.0021.t:0 "Дочь господина"
 rse_bondage.0021.desc:0 "[daughter.GetTitledFirstName], взрослая дочь господина, стала находить тебя в саду, коридоре, фруктовом саду. Дерзкая. Безрассудная. И в ней течёт кровь господина."
 rse_bondage.0021.a:0 "Встретить её взгляд. Что будет, то будет."
 rse_bondage.0021.b:0 "Твёрдо отказать. Спасти обоих."
 rse_bondage.0021.c:0 "Донести господину."

 rse_bondage.0022.t:0 "Железо и огонь"
 rse_bondage.0022.desc:0 "[fellow_slave.GetTitledFirstName] вкладывает железный прут тебе в ладонь. Этой ночью дюжина рабов восстаёт — надсмотрщики мертвы, ворота открыты, свобода за стеной. Они хотят, чтобы ты вёл. Они пойдут за тобой."
 rse_bondage.0022.a:0 "Возглавить восстание. Железом и огнём!"
 rse_bondage.0022.b:0 "Отказаться — но сохранить тайну."
 rse_bondage.0022.c:0 "Предупредить господина. Заслужить место за столом."
