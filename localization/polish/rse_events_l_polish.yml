l_polish:
 rse_war.0001.t:0 "Święta gorliwość przed bitwą"
 rse_war.0001.desc:0 "W przededniu bitwy [court_priest.GetTitledFirstName] gromadzi wojsko. Wierni modlą się, sztandary zostają poświęcone, a heretycki wróg zostaje wyklęty. Nastrój gorączkowy — armia czeka na twoje słowo."
 rse_war.0001.a:0 "$HIGHLIGHT$Niech kapłan przemówi — to święta wojna!$END$"
 rse_war.0001.b:0 "Przypomnij im: walczymy o ziemię, nie o niebiosa."
 rse_war.0001.c:0 "Mam wątpliwości co do tej 'świętej' sprawy..."

 rse_war.0002.t:0 "Niewierny w kajdanach"
 rse_war.0002.desc:0 "[captured_enemy.GetTitledFirstName], jeniec obcej wiary, zostaje przed tobą przyprowadzony. Nadworny kapelan żąda jego nawrócenia. Twoi dowódcy żądają jego głowy. Łaska czy gorliwość?"
 rse_war.0002.a:0 "Nawróć go — niech ujrzy prawdziwą wiarę."
 rse_war.0002.b:0 "Pokazowa egzekucja. Pień czeka."
 rse_war.0002.c:0 "Uwolnij go. Nie jesteśmy potworami."

 rse_war.0003.t:0 "Wierni gromadzą się"
 rse_war.0003.desc:0 "Wieść o twojej świętej walce rozeszła się szeroko. Chłopi, mnisi i nowicjusze z całego kraju przybywają do stolicy, gotowi chwycić za broń w imię wiary."
 rse_war.0003.a:0 "Uzbroić ich i wymaszerować."
 rse_war.0003.b:0 "Pobłogosławić i odesłać — niech kler pamięta naszą pobożność."

 rse_realm.0001.t:0 "Wasal niezadowolony"
 rse_realm.0001.desc:0 "[dissident_vassal.GetTitledFirstName] innej wiary przybył na dwór z listą krzywd. Ton spokojny, lecz w oczach pali się uraza. Państwo śledzi twoją odpowiedź."
 rse_realm.0001.a:0 "Wysłuchaj go. Tolerancja to mądrość."
 rse_realm.0001.b:0 "Przypomnij mu, czyje to państwo."
 rse_realm.0001.c:0 "Sakiewka złota uspokoi większość żalów. (-50 złota)"

 rse_realm.0002.t:0 "Frakcja religijna"
 rse_realm.0002.desc:0 "Szpiedzy donoszą: wasale obcej wiary pod wodzą [faction_leader.GetTitledFirstName] potajemnie się zbierają. Mówią o krzywdach, o prawach, a może... o czymś więcej."
 rse_realm.0002.a:0 "Ułagodzić ustępstwami."
 rse_realm.0002.b:0 "Uderzyć pierwszym — uwięzić przywódcę!"
 rse_realm.0002.c:0 "Obserwować i czekać. Wiedza to potęga."

 rse_realm.0003.t:0 "Plan nawrócenia"
 rse_realm.0003.desc:0 "[court_chaplain.GetTitledFirstName] proponuje wielką misję, opłaconą z twojej kasy, by przyprowadzić zbłąkane hrabstwa do prawdziwej wiary."
 rse_realm.0003.a:0 "Sfinansuj misję. (-100 złota)"
 rse_realm.0003.b:0 "Państwo ma pilniejsze potrzeby."

 rse_realm.0004.t:0 "Potępić heretyków"
 rse_realm.0004.desc:0 "Docierają do ciebie doniesienia o hrabstwach jawnie wyznających heretycką wiarę. Ambony domagają się publicznego potępienia."
 rse_realm.0004.a:0 "Potępić ich z każdej ambony!"
 rse_realm.0004.b:0 "Mądry władca wybiera swoje bitwy."

 rse_domain.0001.t:0 "Herezja w domenie"
 rse_domain.0001.desc:0 "W [troubled_county.GetName] słychać dziwne kazania. Nocą chłopi zbierają się w stodołach, szepcąc o nowych doktrynach. Herezja podnosi głowę na twoich ziemiach."
 rse_domain.0001.a:0 "Wszcząć inkwizycję. (-75 złota)"
 rse_domain.0001.b:0 "Niech mówią. Idei nie da się zakuć w kajdany."
 rse_domain.0001.c:0 "Zignorować. Są ważniejsze sprawy."

 rse_domain.0002.t:0 "Odmowa płacenia dziesięciny"
 rse_domain.0002.desc:0 "Chłopi [rebellious_county.GetName], niedzielący twojej wiary, odmówili płacenia dziesięciny. Nazywają twoich poborców niewiernymi, a kapłanów — kłamcami."
 rse_domain.0002.a:0 "Posłać żołnierzy. Podatek zostanie ściągnięty — z nawiązką."
 rse_domain.0002.b:0 "Obniżyć podatek dla pokoju. (-25 złota)"
 rse_domain.0002.c:0 "Zmusić ich do prawdziwej wiary!"

 rse_domain.0003.t:0 "Wizja świątyni"
 rse_domain.0003.desc:0 "Przyśnił ci się żywy sen: wielka świątynia wyrastająca z ziemi [blessed_county.GetName]. Pobożni mówią, że to powołanie. Skarbnik się nie zgadza."
 rse_domain.0003.a:0 "Wznieść świątynię. Bogowie nie przyjmą mniej. (-150 złota, -100 pobożności)"
 rse_domain.0003.b:0 "To był tylko sen."

 rse_domain.0004.t:0 "Narastający bunt"
 rse_domain.0004.desc:0 "[revolt_county.GetName] wre. Chłopi obcej wiary jawnie mówią o obaleniu twojej władzy. Trzeba działać, nim się przeleje."
 rse_domain.0004.a:0 "Wprowadzić garnizon do hrabstwa. (-50 złota)"
 rse_domain.0004.b:0 "Ustępstwa, by ich uspokoić."
 rse_domain.0004.c:0 "Edyktem nawrócić ich — i raz na zawsze!"

 rse_domain.0005.t:0 "Dworzanin obcej wiary"
 rse_domain.0005.desc:0 "[foreign_courtier.GetTitledFirstName] długo służy na twoim dworze — lecz nie dzieli twojej wiary. Kapelan pragnie jego usunięcia; decyzja należy do ciebie."
 rse_domain.0005.a:0 "Skłonić do nawrócenia."
 rse_domain.0005.b:0 "Wygnać z dworu."
 rse_domain.0005.c:0 "Służył dobrze. Niech zostanie."

 rse_reconquest.0001.t:0 "Chrześcijańskie hrabstwo pod półksiężycem"
 rse_reconquest.0001.desc:0 "[conquered_county.GetName] jest teraz twoje — zdobyte mieczem. Lud klęka przed krzyżem, nie qiblą. [christian_elder.GetTitledFirstName] błaga o łaskę dla swojej trzody. Ulema czeka na twój dekret."
 rse_reconquest.0001.a:0 "Będą dhimmi — chronieni Ludzie Księgi."
 rse_reconquest.0001.b:0 "Niech płacą dżizję i żyją po swojemu."
 rse_reconquest.0001.c:0 "Wszyscy muszą przyjąć prawdziwą wiarę — nawrócić ich!"

 rse_reconquest.0002.t:0 "Krzyż przeciw półksiężycowi"
 rse_reconquest.0002.desc:0 "[rebel_county.GetName] wre. Chrześcijańscy chłopi zaczęli zbierać się w górach, chowając krzyże pod szatami i ostrząc kosy. Powstanie blisko."
 rse_reconquest.0002.a:0 "Zmiażdżyć ich garnizonem. (-75 złota)"
 rse_reconquest.0002.b:0 "Odwołać dżizję — chleb ważniejszy od krwi. (-50 złota)"
 rse_reconquest.0002.c:0 "Oczyścić chrześcijańską dzielnicę. Pokazowo."

 rse_reconquest.0003.t:0 "Błaganie biskupa"
 rse_reconquest.0003.desc:0 "[bishop.GetTitledFirstName], biskup [christian_county.GetName], poprosił o audiencję. Klęczy w twoim dworze, prosząc, by oszczędzić kościoły i pozostawić kler w spokoju."
 rse_reconquest.0003.a:0 "Przychylić się. Mądry sułtan rządzi wieloma wiarami."
 rse_reconquest.0003.b:0 "Kościoły zachowają mury — i zapłacą wysoki podatek."
 rse_reconquest.0003.c:0 "W kajdany. Niech chrześcijanie znają swoje miejsce."

 rse_reconquest.0004.t:0 "Rekonkwista podnosi głowę"
 rse_reconquest.0004.desc:0 "Szpiedzy donoszą, że [christian_neighbor.GetTitledFirstName] głosi krucjatę — odzyskanie ziem, którymi władasz wraz z chrześcijańskimi poddanymi. Na granicy niespokojnie."
 rse_reconquest.0004.a:0 "Wzmocnić granice. (-100 złota)"
 rse_reconquest.0004.b:0 "Zdobyć serca chrześcijańskich poddanych, nim nas zdradzą."
 rse_reconquest.0004.c:0 "Stłumić — zdusić każdy chrześcijański głos w naszych ziemiach."

 rse_reconquest.0005.t:0 "Ukryty krzyż"
 rse_reconquest.0005.desc:0 "[secret_christian.GetTitledFirstName], od lat służący na dworze jako prawowierny muzułmanin, został przyłapany na modlitwie przed krucyfiksem w swojej celi. Kryptochrześcijanin ukryty na widoku."
 rse_reconquest.0005.a:0 "Apostata. Klinga zdecyduje."
 rse_reconquest.0005.b:0 "Zmusić do pokuty i prawdziwej wiary."
 rse_reconquest.0005.c:0 "Zachować tajemnicę. Wierny sługa to rzadkość."

 rse_reconquest.0006.t:0 "Kwestia mozarabska"
 rse_reconquest.0006.desc:0 "W [mozarab_county.GetName] dzieje się dziwna rzecz: chrześcijanie mówią naszym językiem, noszą nasze szaty, śpiewają nasze pieśni — a wciąż żegnają się o świcie. Nie są ani nami, ani nimi. Co z nimi czynić?"
 rse_reconquest.0006.a:0 "Niech rozkwitają po swojemu."
 rse_reconquest.0006.b:0 "Zarabizować ich w pełni — język, obyczaj, wszystko."
 rse_reconquest.0006.c:0 "Ciekawostka, nic więcej. Zostawić ich."

 rse_crusade.0001.t:0 "Saraceńskie hrabstwo pod krzyżem"
 rse_crusade.0001.desc:0 "[conquered_county.GetName] jest twoje. [imam.GetTitledFirstName], miejscowy imam, błaga za swoim ludem. Biskupi domagają się zburzenia minaretów. Jaka jest twoja wola?"
 rse_crusade.0001.a:0 "Każdy meczet zamienić w kościół. Krzyż stoi tu teraz."
 rse_crusade.0001.b:0 "Niech żyją — za odpowiednią daninę."
 rse_crusade.0001.c:0 "Będziemy nimi rządzić sprawiedliwie, ludźmi każdej wiary."

 rse_crusade.0002.t:0 "Rycerze Zakonu"
 rse_crusade.0002.desc:0 "[templar.GetTitledFirstName], rycerz świętego zakonu, przybył na twój dwór. Proponuje, by jego bracia obsadzili garnizon w [frontier_county.GetName] — w zamian za ziemie, złoto lub po prostu łaskę Bożą."
 rse_crusade.0002.a:0 "Przyznać im garnizon. Granica ich potrzebuje."
 rse_crusade.0002.b:0 "Dać złota do skarbca zakonu. (-100 złota)"
 rse_crusade.0002.c:0 "Odmówić. Ci rycerze nie odpowiadają nikomu prócz mistrza."

 rse_crusade.0003.t:0 "Saraceński najazd"
 rse_crusade.0003.desc:0 "Jeźdźcy przelatują przez [raided_county.GetName] — saraceńska konnica zza granicy, odpłacająca krwią i ogniem za nasz podbój."
 rse_crusade.0003.a:0 "Podnieść krzyż — w pościg! (-100 złota)"
 rse_crusade.0003.b:0 "Niech muzułmańskie wsie płoną. Nigdy nie były w pełni nasze."
 rse_crusade.0003.c:0 "Wzmocnić granice. (-50 złota)"

 rse_crusade.0004.t:0 "Wierni się nie ugną"
 rse_crusade.0004.desc:0 "[muslim_rebel_county.GetName] staje się niespokojne. Wezwanie muezzina nie rozbrzmiewa, meczety milczą — a mężczyźni zbierają się w zaułkach z ukrytą stalą."
 rse_crusade.0004.a:0 "Nawrócić ich — mieczem, jeśli nie słowem."
 rse_crusade.0004.b:0 "Wygnać. Niech ziemia odrodzi się na nowo."
 rse_crusade.0004.c:0 "Dać im pokój. Tolerancja to chrześcijańska cnota."

 rse_heresy.0001.t:0 "Heretycki kaznodzieja"
 rse_heresy.0001.desc:0 "[heretic_preacher.GetTitledFirstName] głosi kazania na targach [preacher_county.GetName]. Jego doktryny wykrzywiają prawdziwą wiarę — a jednak ludzie zbierają się, by słuchać, spragnieni nowych słów."
 rse_heresy.0001.a:0 "Spalić heretyka. Niech jego popiół ostrzeże resztę."
 rse_heresy.0001.b:0 "Wygnać go z naszych ziem."
 rse_heresy.0001.c:0 "Wezwać go. Wysłucham jego argumentów."

 rse_heresy.0002.t:0 "Sobór o doktrynie"
 rse_heresy.0002.desc:0 "[learned_theologian.GetTitledFirstName] proponuje zwołać sobór, by rozstrzygnąć doktrynalny spór dzielący kler. Wierni czekają na twoją odpowiedź."
 rse_heresy.0002.a:0 "Zwołać sobór. Ja nazwę prawdę. (-100 pobożności)"
 rse_heresy.0002.b:0 "Niech kler sam rozstrzygnie."
 rse_heresy.0002.c:0 "Żadna ze stron nie ma w pełni racji. Uciszyć wszystkich."

 rse_heresy.0003.t:0 "Mistyk w górach"
 rse_heresy.0003.desc:0 "[mystic.GetTitledFirstName] mieszka w jaskini blisko [mystic_county.GetName]. Jedni pielgrzymi mówią, że rozmawia z aniołami. Inni — że z demonami. Sam nie prosi o nic — tylko by go zostawić w spokoju."
 rse_heresy.0003.a:0 "Sprowadzić go na dwór. Taka mądrość to rzadkość."
 rse_heresy.0003.b:0 "Wyciągnąć i stracić."
 rse_heresy.0003.c:0 "Odwiedzić go w tajemnicy. Wysłucham jego słów."

 rse_heresy.0004.t:0 "Wasal popadł w herezję"
 rse_heresy.0004.desc:0 "[heretic_vassal.GetTitledFirstName] był widziany na heretyckich zebraniach — i gorzej, jawnie wyznaje herezję. Zgnilizna w sercu państwa."
 rse_heresy.0004.a:0 "Wrzucić go do lochu."
 rse_heresy.0004.b:0 "Bacznie obserwować. Mądry władca nie uderza pochopnie."
 rse_heresy.0004.c:0 "Przekupić jego kapelana, by go zawrócił. (-75 złota)"

 rse_relic.0001.t:0 "Święta relikwia na sprzedaż"
 rse_relic.0001.desc:0 "[relic_merchant.GetTitledFirstName] pokazuje pozłacany relikwiarz, twierdząc, że zawiera kość świętego, drzazgę prawdziwego krzyża — lub może włos Proroka. Cena jest wysoka."
 rse_relic.0001.a:0 "Kupić relikwię. (-200 złota)"
 rse_relic.0001.b:0 "To oszustwo. Wypędzić go."
 rse_relic.0001.c:0 "Uprzejmie odmówić. Wiara nie potrzebuje pozłacanych kości."

 rse_relic.0002.t:0 "Pielgrzym powraca"
 rse_relic.0002.desc:0 "[pilgrim.GetTitledFirstName] wrócił z długiej pielgrzymki do wielkiej świętości. Twarz wymizerowana, lecz oczy płoną dziwnym ogniem. Prosi o audiencję."
 rse_relic.0002.a:0 "Powitać go jak brata w wierze."
 rse_relic.0002.b:0 "Nagrodzić jego pobożność złotem. (-50 złota)"
 rse_relic.0002.c:0 "Pielgrzymi sieją niepokój. Odprawić."

 rse_relic.0003.t:0 "Cud świadczony"
 rse_relic.0003.desc:0 "Wieść z [miracle_county.GetName]: chłopska dziewczyna podobno płakała krwawymi łzami przed ikoną, a chromy chłopiec wstał i poszedł. Gromadzą się tłumy."
 rse_relic.0003.a:0 "Ogłosić prawdziwym cudem! Wznieść sanktuarium."
 rse_relic.0003.b:0 "Zbadać. Nie damy się zwieść."
 rse_relic.0003.c:0 "Pobierać myto od pielgrzymów. (+75 złota)"

 rse_relic.0004.t:0 "Wezwanie głowy wiary"
 rse_relic.0004.desc:0 "[pontiff.GetTitledFirstName], głowa naszej wiary, przysłał list z żądaniem daniny na święte wojny. Pieczęć ciężka. Skarbnik się krzywi."
 rse_relic.0004.a:0 "Zapłacić daninę z radością. (-150 złota)"
 rse_relic.0004.b:0 "Odmówić. Nic nie jesteśmy winni."
 rse_relic.0004.c:0 "Niech kapelan sporządzi dyplomatyczną odpowiedź."

 rse_pagan.0001.t:0 "Święty gaj"
 rse_pagan.0001.desc:0 "W lasach [grove_county.GetName] twoi leśnicy odkryli starożytny gaj — kości i dary wiszą na gałęziach, ołtarz wciąż pomazany krwią. Stare bogi jeszcze nie umarły."
 rse_pagan.0001.a:0 "Spalić go do korzeni."
 rse_pagan.0001.b:0 "Zostawić. Inne rzeczy są starsze od nas."
 rse_pagan.0001.c:0 "Zbudować kaplicę na tym miejscu. (-50 złota)"

 rse_pagan.0002.t:0 "Poganie w mych ziemiach"
 rse_pagan.0002.desc:0 "W niedziele wieśniacy [pagan_village.GetName] przysięgają na prawdziwą wiarę — ale w bezksiężycowe noce wymykają się do lasów, by zostawić ofiary starszym bogom."
 rse_pagan.0002.a:0 "Posłać misjonarza. Cierpliwość nawraca lepiej niż miecz. (-25 złota)"
 rse_pagan.0002.b:0 "Wkroczyć ze stalą. Zakończyć to."
 rse_pagan.0002.c:0 "Niech wierzą w obie. Wiara to sprawa prywatna."

 rse_pagan.0003.t:0 "Poganin u bramy"
 rse_pagan.0003.desc:0 "[pagan_warrior.GetTitledFirstName], wojownik z zimnej północy, który nie usłyszał prawdziwego słowa, przybył, by ofiarować swój miecz. Sławny, zaciekły — i pogański."
 rse_pagan.0003.a:0 "Przyjąć jego służbę. Miecz nie dba o duszę."
 rse_pagan.0003.b:0 "Służba — ale najpierw chrzest."
 rse_pagan.0003.c:0 "Wygnać go. Nie potrzebujemy pogan."

 rse_jewish.0001.t:0 "Petycja gminy żydowskiej"
 rse_jewish.0001.desc:0 "[jewish_elder.GetTitledFirstName], starszy gminy żydowskiej [jewish_quarter.GetName], przybył z darami i petycją. Żydzi twego domeny proszą o list ochronny."
 rse_jewish.0001.a:0 "Wydać list. Ich handel wzbogaca nas wszystkich."
 rse_jewish.0001.b:0 "Ochrona — za specjalny podatek. (+150 złota)"
 rse_jewish.0001.c:0 "Wygnać wszystkich. Najpierw ich złoto, potem ich plecy."

 rse_jewish.0002.t:0 "Pożyczka w ciężkich czasach"
 rse_jewish.0002.desc:0 "[moneylender.GetTitledFirstName], żydowski lichwiarz, usłyszał o twojej pustej kasie. Oferuje pożyczkę na umiarkowany procent, tylko pod twoją pieczęć."
 rse_jewish.0002.a:0 "Wziąć pożyczkę. (+300 złota)"
 rse_jewish.0002.b:0 "Wziąć — a potem ściąć mu głowę. Dług umrze z nim. (+200 złota)"
 rse_jewish.0002.c:0 "Odmówić. Nie ugnę się przed lichwą."

 rse_jewish.0003.t:0 "Pogrom na ulicach"
 rse_jewish.0003.desc:0 "Wędrowny kaznodzieja rozjuszył chłopów [pogrom_county.GetName] przeciw Żydom. O zmierzchu gromadzą się pochodnie. Czekają tylko na twoje skinienie — lub zakaz."
 rse_jewish.0003.a:0 "Posłać straż, by chroniła dzielnicę."
 rse_jewish.0003.b:0 "Niech motłoch działa — a łupy nasze. (+100 złota)"
 rse_jewish.0003.c:0 "Milczeć. Sprawa nas nie dotyczy."

 rse_faith.0001.t:0 "Kryzys wiary"
 rse_faith.0001.desc:0 "Długą bezsenną nocą pytasz siebie: czy modlitwy znaczą to samo, co kiedyś? Rządziłeś, przelewałeś krew, grzebałeś — lecz czy obiecane niebo wciąż czeka?"
 rse_faith.0001.a:0 "Odnowić śluby. Modlić się żarliwiej niż kiedykolwiek."
 rse_faith.0001.b:0 "Przyznać: już nie wierzę."
 rse_faith.0001.c:0 "Pogrzebać pytanie. Nie ma na nie czasu."

 rse_faith.0002.t:0 "Ślub przed Bogiem"
 rse_faith.0002.desc:0 "Kapelan proponuje, byś złożył wielki ślub przed ołtarzem — związanie twojej woli z Bogiem, publiczny znak pobożności. Jaki ślub złożysz?"
 rse_faith.0002.a:0 "Ślub czystości."
 rse_faith.0002.b:0 "Ślub ubóstwa. (-100 złota)"
 rse_faith.0002.c:0 "Ślub pielgrzymki."
 rse_faith.0002.d:0 "Żadnego ślubu. Słowa to wiatr."

 rse_faith.0003.t:0 "Obcy święty mąż"
 rse_faith.0003.desc:0 "[foreign_holy_man.GetTitledFirstName], uczony mąż innej wiary, tygodniami gości na twoim dworze. Rozmawiał z tobą do późnej nocy — a teraz pyta: czy nie rozważyłbyś jego wiary?"
 rse_faith.0003.a:0 "Odpędzić go zaraz. Nie ulegnę pokusie."
 rse_faith.0003.b:0 "Mówi prawdę... Przyjmę jego wiarę."
 rse_faith.0003.c:0 "Niech zostanie. Słuchać to nie zgadzać się."

 rse_anathema.0001.t:0 "Groźba anatemy"
 rse_anathema.0001.desc:0 "Przybywa posłaniec od [pontiff.GetTitledFirstName] z listem zapieczętowanym czerwonym woskiem. Ostrzega, że twoja niewystarczająca pobożność zwróciła uwagę głowy wiary — i anatema nastąpi, jeśli nie pokutujesz."
 rse_anathema.0001.a:0 "Posłać hojny dar. (-100 złota)"
 rse_anathema.0001.b:0 "Boso pójść do katedry. Okazać pokorę."
 rse_anathema.0001.c:0 "Niech spróbują. Tu ja rządzę, nie oni."

 rse_anathema.0002.t:0 "Rywal traci łaskę"
 rse_anathema.0002.desc:0 "Wieść: [fallen_rival.GetTitledFirstName] został ekskomunikowany przez głowę naszej wiary. Państwo wre. Wykorzystać czy odrzucić — twój wybór."
 rse_anathema.0002.a:0 "Publicznie go potępić! Wykorzystać przewagę."
 rse_anathema.0002.b:0 "Stanąć z nim w godzinie próby."
 rse_anathema.0002.c:0 "Obserwować z cienia. To nie moja sprawa."

 rse_anathema.0003.t:0 "Fanatyk szuka męczeństwa"
 rse_anathema.0003.desc:0 "[zealot.GetTitledFirstName], żarliwy członek twego dworu, prosił o audiencję. Pragnie wyruszyć z niebezpieczną misją nawracania niewiernych — wiedząc, że pewnie zapłaci za to życiem."
 rse_anathema.0003.a:0 "Sfinansować misję. Niech Pan będzie z nim. (-75 złota)"
 rse_anathema.0003.b:0 "Po cichu go uśmiercić. Tacy fanatycy są niebezpieczni."
 rse_anathema.0003.c:0 "Odmówić — i odprawić z dworu."

 rse_slave.0001.t:0 "Targ niewolników w domenie"
 rse_slave.0001.desc:0 "[slave_trader.GetTitledFirstName] proponuje otwarcie targu niewolników w [market_county.GetName]. Sakaliba z północy, Zindż z południa, jeńcy z każdego frontu — wszyscy zmieniają ręce za srebro."
 rse_slave.0001.a:0 "Niech się otworzy. Moneta popłynie."
 rse_slave.0001.b:0 "W moich ziemiach nie będzie handlu niewolnikami. Odprawić go."
 rse_slave.0001.c:0 "Otworzyć, ale ściśle regulować. Żadnych współwyznawców."

 rse_slave.0002.t:0 "Karawana niewolników"
 rse_slave.0002.desc:0 "[slaver.GetTitledFirstName] wprowadza na dziedziniec karawanę w łańcuchach. Wśród nich pierwszy oferowany jest [saqlabi.GetTitledFirstName], jasnowłosy jeniec z ziem słowiańskich. Handlarz wymienia cenę."
 rse_slave.0002.a:0 "Kupić. Będą służyć. (-75 złota)"
 rse_slave.0002.b:0 "Kupić, ochrzcić, wywyższyć. (-150 złota)"
 rse_slave.0002.c:0 "Wygnać karawanę za bramy."

 rse_slave.0003.t:0 "Założyć korpus mameluków"
 rse_slave.0003.desc:0 "[mamluk_commander.GetTitledFirstName], chłopiec kumański porwany na wojnie i wychowany na wojownika islamu, klęka przed tobą. Proponuje korpus wojowników-niewolników — fanatycznie wiernych, niezwiązanych klanem, przysięgających tylko tobie."
 rse_slave.0003.a:0 "Założyć korpus. Będą moim żelaznym ramieniem. (-200 złota)"
 rse_slave.0003.b:0 "Służą mi wolni. Korpusu nie będzie."

 rse_slave.0004.t:0 "Powstanie niewolników"
 rse_slave.0004.desc:0 "Nad [revolt_county.GetName] wznosi się dym. Niewolnicy powstali — nadzorcy wybici, kajdany zrzucone, składy płoną. Żądają wolności — albo śmierci."
 rse_slave.0004.a:0 "Zmiażdżyć. Powiesić każdego ocalałego. (-75 złota)"
 rse_slave.0004.b:0 "Uwolnić. Osiedlić na ziemi."
 rse_slave.0004.c:0 "Wykupić się — obiecać lepsze warunki. (-40 złota)"

 rse_slave.0005.t:0 "Akt manumisji"
 rse_slave.0005.desc:0 "[freedman.GetTitledFirstName], stary niewolnik domowy, klęka przed tobą. Kapelan mówi, że Bogu byłoby miłe go uwolnić. Włodarz — że pozbawi to dom użytecznego sługi."
 rse_slave.0005.a:0 "Uwolnić. Niech Pan to widzi i pamięta."
 rse_slave.0005.b:0 "Sprzedać z zyskiem. (+50 złota)"
 rse_slave.0005.c:0 "Wygnać. Nie jest mi już potrzebny."

 rse_slave.0006.t:0 "Chrześcijanie do wykupu"
 rse_slave.0006.desc:0 "Przybywa delegacja mnichów trynitarzy. Błagają, byś sfinansował wykup chrześcijańskich jeńców z saraceńskich targów niewolników. Cena wysoka — lecz każda zbawiona dusza to dusza zbawiona."
 rse_slave.0006.a:0 "Wykupić wszystkich. (-150 złota)"
 rse_slave.0006.b:0 "Wykupić, ile mogę. (-50 złota)"
 rse_slave.0006.c:0 "Nie mogę. Państwu potrzebna każda moneta."

 rse_slave.0007.t:0 "Niewolnicy z napadu"
 rse_slave.0007.desc:0 "Twoi wojownicy wracają z drakkarem pełnym niewolników — mężów i niewiast w łańcuchach, przeznaczonych do pracy w [thrall_county.GetName]. Wodzowie czekają na twoje słowo."
 rse_slave.0007.a:0 "Do pracy. Pola łakną."
 rse_slave.0007.b:0 "Uwolnić. Będą wyzwoleńcami, nie bydłem."
 rse_slave.0007.c:0 "Sprzedać wszystkich na targu. (+200 złota)"

 rse_slave.0008.t:0 "Ulubiona nałożnica"
 rse_slave.0008.desc:0 "[concubine.GetTitledFirstName], przyprowadzona do twego domu jako niewolnica, stała ci się bliska. Kapelan sugeruje, że akt manumisji oddałby cześć i tobie, i Bogu."
 rse_slave.0008.a:0 "Uwolnić. Jej oddanie zasługuje na nie mniej."
 rse_slave.0008.b:0 "Pozostanie moja. Uczucie to nie powód do głupot. (+50 złota)"
 rse_slave.0008.c:0 "Odesłać. Nie ulegnę pokusie."

 rse_reconquest.0007.t:0 "Chrześcijański pan się korzy"
 rse_reconquest.0007.desc:0 "[christian_noble.GetTitledFirstName], potomek starego chrześcijańskiego rodu z [noble_county.GetName], przybywa na twój dwór ze spuszczoną głową. Oferuje miecz, sztandar i wierność — byleby zachować ojczyzny."
 rse_reconquest.0007.a:0 "Przyjąć jego przysięgę. Użyteczny współpracownik."
 rse_reconquest.0007.b:0 "Zachowa ziemię — lecz najpierw przyjmie szahadę."
 rse_reconquest.0007.c:0 "Stara krew musi odejść. Pień czeka."

 rse_reconquest.0008.t:0 "Dzwonnica czy minaret"
 rse_reconquest.0008.desc:0 "Wielka katedra [cathedral_county.GetName] stoi w sercu miasta — jej dzwony wciąż bije chrześcijańska ręka. Imamowie żądają, by oddać ją Allahowi. Co czynić?"
 rse_reconquest.0008.a:0 "Zamienić w wielki meczet. (-100 złota)"
 rse_reconquest.0008.b:0 "Podzielić — piątek dla nas, niedziela dla nich."
 rse_reconquest.0008.c:0 "Zburzyć. Kamień po kamieniu."

 rse_reconquest.0009.t:0 "Relikwie świętego"
 rse_reconquest.0009.desc:0 "W krypcie pod [relic_county.GetName] spoczywają relikwie starego chrześcijańskiego świętego — kości w pozłacanym relikwiarzu, podobno czynią cuda. Chrześcijanie wciąż przychodzą się modlić. Skarbiec patrzy głodnie."
 rse_reconquest.0009.a:0 "Zedrzeć złoto. Kości nic nie warte. (+200 złota)"
 rse_reconquest.0009.b:0 "Zostawić sanktuarium w spokoju. Nie jesteśmy barbarzyńcami."
 rse_reconquest.0009.c:0 "Spalić kości. Ich święty nie będzie nam więcej dokuczał."

 rse_reconquest.0010.t:0 "Pojmana szlachcianka"
 rse_reconquest.0010.desc:0 "[noblewoman.GetTitledFirstName], szlachcianka z ziem chrześcijańskich, została pojmana w ostatniej kampanii. Klęczy przed tobą, czekając na wyrok — wykup, nawrócenie albo harem."
 rse_reconquest.0010.a:0 "Zwrócić ją krewnym za okup. (+100 złota)"
 rse_reconquest.0010.b:0 "Uwolnić — jeśli przyjmie szahadę."
 rse_reconquest.0010.c:0 "Będzie służyć w mym domu. (+50 złota)"

 rse_reconquest.0011.t:0 "Petycja o millet"
 rse_reconquest.0011.desc:0 "[millet_leader.GetTitledFirstName], przywódca chrześcijan [millet_county.GetName], błaga, by jego ludowi pozwolono rządzić sobą — sądy, szkoły, prawa — pod twą zwierzchnią władzą."
 rse_reconquest.0011.a:0 "Nadać millet. Niech każdy lud żyje po swojemu."
 rse_reconquest.0011.b:0 "Nie. Żyją pod naszym prawem, jak każdy poddany."
 rse_reconquest.0011.c:0 "Sprzedać prawo samorządu. (+75 złota)"

 rse_reconquest.0012.t:0 "Chrześcijański chłopiec"
 rse_reconquest.0012.desc:0 "[christian_boy.GetTitledFirstName], chrześcijański chłopiec wzięty z [devshirme_county.GetName], został przyprowadzony do twego dworu. Jasne oczy, ostry umysł — zadatki przyszłego sługi imperium."
 rse_reconquest.0012.a:0 "Wychować na muzułmanina. Będzie jednym z nas."
 rse_reconquest.0012.b:0 "Wykształcić na dworze. Niech zachowa wiarę."
 rse_reconquest.0012.c:0 "Zwrócić go ludowi."

 rse_reconquest.0013.t:0 "Sufi u bram"
 rse_reconquest.0013.desc:0 "[sufi.GetTitledFirstName], wędrowny mistyk sufi, przybył na twój dwór. Proponuje zbudować klasztor w [sufi_county.GetName] i zdobywać serca chrześcijan łagodnością — nie mieczem."
 rse_reconquest.0013.a:0 "Sfinansować klasztor. Niech miłość zdziała, czego stal nie może. (-50 złota)"
 rse_reconquest.0013.b:0 "Miecz szybszy. Wygnać go."
 rse_reconquest.0013.c:0 "Niech spróbuje, ale niczego nie oczekuję."

 rse_reconquest.0014.t:0 "Chrześcijańskie żagle na horyzoncie"
 rse_reconquest.0014.desc:0 "Nad wybrzeżem [coastal_county.GetName] wznosi się dym — chrześcijańska flota, być może zza morza, splądrowała wieś. Wydziedziczone chrześcijańskie rodziny hrabstwa mogły ich powitać."
 rse_reconquest.0014.a:0 "Obsadzić wybrzeże garnizonem. (-75 złota)"
 rse_reconquest.0014.b:0 "Wziąć zakładników z miejscowej szlachty."
 rse_reconquest.0014.c:0 "Przyjąć stratę. Taka cena imperium."

 rse_reconquest.0015.t:0 "Msza w katakumbach"
 rse_reconquest.0015.desc:0 "Pod ulicami [vault_county.GetName] twoi szpiedzy znaleźli sklepioną komnatę, gdzie chrześcijanie wciąż zbierają się na Mszę — przy świecach, szeptem, gdy myślą, że są niewidziani."
 rse_reconquest.0015.a:0 "Zamurować katakumby. Cegła po cegle."
 rse_reconquest.0015.b:0 "Udawać, że się nie wie. Tajemna wiara to nie wiara."
 rse_reconquest.0015.c:0 "Znaleźć wszystkich — i potroić im dżizję."

 rse_reconquest.0016.t:0 "Asceta żąda surowości"
 rse_reconquest.0016.desc:0 "[ascetic.GetTitledFirstName], pustynny asceta wychudły postem, przybył na twój dwór. Potępia twoją tolerancję — chrześcijanki bez zasłon, niezłamane dzwony, dhimmi zbyt dumnie chodzących. Wiara, deklaruje, zostaje utracona."
 rse_reconquest.0016.a:0 "Mówi prawdę. Dokręcić śruby."
 rse_reconquest.0016.b:0 "Fanatycy są niebezpieczni. Wygnać go."
 rse_reconquest.0016.c:0 "Ściąć za zuchwałość. Tu ja jestem prawem."

 rse_reconquest.0017.t:0 "Małżeństwo dwóch światów"
 rse_reconquest.0017.desc:0 "Znakomici [bride_county.GetName] proponują małżeństwo — [christian_bride.GetTitledFirstName] ze starej chrześcijańskiej szlachty wejdzie do twego domu. Związek legitymizuje twoje rządy wśród podbitych."
 rse_reconquest.0017.a:0 "Przyjąć. Niech dwa światy staną się jednym przez małżeństwo."
 rse_reconquest.0017.b:0 "Tylko po nawróceniu. Najpierw szahada, potem łoże."
 rse_reconquest.0017.c:0 "Odmówić. Moja krew nie zmiesza się z ich."

 rse_reconquest.0018.t:0 "Apostata ucieka"
 rse_reconquest.0018.desc:0 "[apostate.GetTitledFirstName], świeżo nawrócony na islam, został zatrzymany na granicy z krzyżem ukrytym pod szatą. Uciekał z powrotem do Chrześcijaństwa — by umrzeć jako chrześcijanin, jak mówi."
 rse_reconquest.0018.a:0 "Śmierć to cena apostazji. Ściąć go."
 rse_reconquest.0018.b:0 "Uwięzić. Może modlitwa zbawi jego duszę."
 rse_reconquest.0018.c:0 "Wypuścić. Zmuszony konwertyta to nie konwertyta."

 rse_reconquest.0019.t:0 "Odbudować miasto"
 rse_reconquest.0019.desc:0 "[ruined_county.GetName] wciąż nosi blizny podboju — spalone dzielnice, zawalone mury, ludność do połowy uciekła. Odbudowa może zdobyć serca lub opróżnić skarbiec."
 rse_reconquest.0019.a:0 "Wielka odbudowa — ogrody, fontanny, wszystko. (-200 złota)"
 rse_reconquest.0019.b:0 "Załatać, co połamane. (-100 złota)"
 rse_reconquest.0019.c:0 "Niech gnije. Mamy nowe ziemie do podbicia."

 rse_reconquest.0020.t:0 "Spór wiar"
 rse_reconquest.0020.desc:0 "[debater_priest.GetTitledFirstName], uczony ksiądz zza granicy, oferuje publiczny dysput z [court_imam.GetTitledFirstName] o zaletach ich wiar. Dwór się zebrał, wino nalane, ciekawość trzyma salę."
 rse_reconquest.0020.a:0 "Nie ma dysputy. Wziąć mu głowę."
 rse_reconquest.0020.b:0 "Niech mówi. Mądry władca słucha wszystkich."
 rse_reconquest.0020.c:0 "Został pokonany. Niech przyjmie szahadę — lub umrze."
